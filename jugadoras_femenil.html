<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Líderes Femenil - Amigos del EASY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .bg-femenil { background: linear-gradient(135deg, #4c0519 0%, #831843 100%); }
        .card-femenil { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(244, 114, 182, 0.2); }
        .text-rose { color: #f472b6; }
    </style>
</head>
<body class="bg-zinc-950 text-slate-200">

    <nav class="bg-black p-4 border-b-4 border-pink-600 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <span class="font-black italic uppercase text-lg">Líderes <span class="text-pink-500">Femenil</span></span>
            <a href="index.html" class="text-[10px] bg-pink-600 px-4 py-2 rounded-full font-black uppercase">Regresar</a>
        </div>
    </nav>

    <header class="py-12 px-6 text-center bg-femenil">
        <p class="text-pink-300 text-[10px] uppercase tracking-[0.5em] font-black mb-2">Estadísticas Individuales</p>
        <h1 class="text-4xl font-black italic uppercase tracking-tighter">Temporada <span class="text-white underline">2026</span></h1>
    </header>

    <main class="max-w-7xl mx-auto p-4 -mt-6 space-y-6">
        <div class="bg-pink-900/20 border-l-4 border-pink-600 p-4 rounded-r-xl">
            <p class="text-[10px] font-black uppercase text-pink-400 italic">
                <i class="fa fa-info-circle mr-2"></i> Mínimo 5 juegos jugados para Play-offs.
            </p>
        </div>

        <div class="relative max-w-md mx-auto">
            <input type="text" id="buscadorJugadoras" onkeyup="filtrarTabla()" placeholder="Buscar por nombre o equipo..." 
                class="w-full pl-10 pr-4 py-3 bg-zinc-900 border border-pink-900/50 rounded-2xl text-xs font-bold uppercase focus:ring-2 focus:ring-pink-500 outline-none transition-all">
            <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-pink-500"></i>
        </div>

        <div class="card-femenil rounded-3xl overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-[10px]">
                   <thead>
    <tr class="bg-zinc-900 text-zinc-500 uppercase font-black border-b border-zinc-800 text-center">
        <th class="p-5 text-left text-white">Jugador / Equipo</th>
        <th>Cat</th>
        <th>JJ</th>
        <th>AB</th>
        <th>H</th>
        <th class="text-red-600">RBI</th>
        <th class="text-orange-600">HR</th>
        <th class="text-fire">AVG</th>
    </tr>
</thead>
                    <tbody id="tablaGlobal" class="divide-y divide-pink-900/20"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const API = "https://ley57.onrender.com/api";
        async function cargar() {
    try {
        const [resP, resE] = await Promise.all([
            fetch(`${API}/players?liga=femenil`), 
            fetch(`${API}/equipos?liga=femenil`)
        ]);
        
        const players = await resP.json();
        const equipos = await resE.json();
        const tabla = document.getElementById('tablaGlobal');
        
        players.sort((a,b) => (b.avg || 0) - (a.avg || 0));

        tabla.innerHTML = players.map(p => {
            // BUSQUEDA BLINDADA: Limpiamos espacios y pasamos a mayúsculas
            const datosEquipo = equipos.find(e => 
                e.nombre.trim().toUpperCase() === p.equipo.trim().toUpperCase()
            );
            
            const categoria = datosEquipo ? datosEquipo.categoria : "SIN CAT";

            return `
                <tr class="fila-jugador hover:bg-pink-50/10 transition-all text-center border-b border-zinc-900">
                    <td class="p-4 text-left">
                        <div class="font-black text-white uppercase italic tracking-tighter">${p.nombre}</div>
                        <div class="text-[9px] text-pink-500 font-black uppercase">${p.equipo}</div>
                    </td>
                    <td class="text-zinc-400 font-bold italic text-[10px]">${categoria}</td>
                    <td class="font-bold text-white bg-white/5">${p.jj || 0}</td>
                    <td>${p.vb || 0}</td>
                    <td class="text-white font-bold">${p.h || 0}</td>
                    <td class="text-pink-500 font-black">${p.rbi || 0}</td>
                    <td class="text-orange-500 font-black">${p.hr || 0}</td>
                    <td class="text-white font-black text-sm italic">${(p.avg || 0).toFixed(3)}</td>
                </tr>`;
        }).join('');
    } catch (e) { console.error("Error:", e); }
}


        function filtrarTabla() {
            const bus = document.getElementById('buscadorJugadoras').value.toUpperCase();
            const filas = document.getElementsByClassName('fila-jugadora');
            for (let f of filas) f.style.display = f.innerText.toUpperCase().includes(bus) ? "" : "none";
        }
        cargar();
    </script>
</body>
</html>
