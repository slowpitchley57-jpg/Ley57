<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hoja de Anotación K-21 Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Estilo de Hoja de Papel */
        .score-paper { background-color: #fff; border: 2px solid #333; box-shadow: 10px 10px 0px #cbd5e1; }
        .cell { width: 45px; height: 45px; border: 0.5px solid #94a3b8; position: relative; font-size: 10px; font-weight: 900; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .cell:hover { background-color: #f1f5f9; }
        .diamond-cell { width: 18px; height: 18px; border: 1px solid #ddd; transform: rotate(45deg); position: absolute; }
        .diamond-cell.active { background: #ef4444; border-color: #b91c1c; }
        
        /* Diamante de Seguimiento Superior */
        .field-box { position: relative; width: 120px; height: 120px; background: #166534; transform: rotate(45deg); margin: 20px auto; border: 3px solid #052e16; }
        .b-spot { position: absolute; width: 15px; height: 15px; background: #fff; border: 2px solid #333; transform: rotate(-45deg); }
        .b-spot.occupied { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
        .h-spot { bottom: -8px; right: -8px; border-radius: 0 0 50% 0; }
        .b1-spot { top: -8px; right: -8px; }
        .b2-spot { top: -8px; left: -8px; }
        .b3-spot { bottom: -8px; left: -8px; }

        .hidden { display: none; }
        .text-red { color: #ef4444; }
    </style>
</head>
<body class="bg-slate-200 p-2 md:p-6 font-mono">

    <div id="setup" class="max-w-md mx-auto bg-white p-8 rounded-3xl shadow-2xl border-t-8 border-blue-900">
        <h2 class="font-black italic text-xl uppercase mb-6 text-center">Configurar Scorecard</h2>
        <div class="space-y-4">
            <select id="liga" onchange="getGames()" class="w-full p-4 bg-slate-100 rounded-2xl font-bold uppercase">
                <option value="">-- LIGA --</option>
                <option value="femenil">FEMENIL</option>
                <option value="varonil">VARONIL</option>
            </select>
            <select id="juego" class="w-full p-4 bg-slate-100 rounded-2xl font-bold uppercase">
                <option value="">-- JUEGO --</option>
            </select>
            <button onclick="loadRosters()" class="w-full bg-blue-900 text-white p-4 rounded-2xl font-black uppercase italic">Seleccionar Jugadoras</button>
        </div>
    </div>

    <div id="lineupPicker" class="hidden max-w-4xl mx-auto bg-white p-8 rounded-3xl shadow-2xl">
        <h2 class="font-black text-center uppercase italic border-b pb-4 mb-4">Seleccionar Lineup para: <span id="teamNamePicker" class="text-blue-900">--</span></h2>
        <div id="playerChecklist" class="grid grid-cols-2 md:grid-cols-3 gap-3 max-h-96 overflow-y-auto p-2"></div>
        <div class="mt-6 flex gap-4">
            <button onclick="confirmLineup()" class="flex-1 bg-emerald-600 text-white p-4 rounded-2xl font-black uppercase">Confirmar y Abrir Hoja</button>
        </div>
    </div>

    <div id="scoreSheet" class="hidden flex flex-col gap-4 animate-fade-in">
        
        <header class="bg-slate-900 text-white p-4 rounded-2xl flex justify-between items-center shadow-lg">
            <div class="flex items-center gap-4">
                <div class="field-box">
                    <div id="f1" class="b-spot b1-spot"></div>
                    <div id="f2" class="b-spot b2-spot"></div>
                    <div id="f3" class="b-spot b3-spot"></div>
                    <div id="fh" class="b-spot h-spot"></div>
                </div>
                <div>
                    <h1 id="headerTeams" class="font-black text-sm md:text-xl italic uppercase">-- VS --</h1>
                    <div class="flex gap-4 mt-2">
                        <span class="text-[10px] bg-red-600 px-2 py-0.5 rounded">OUTS: <span id="outText">0</span></span>
                        <span class="text-[10px] bg-blue-600 px-2 py-0.5 rounded">SCORE: <span id="scoreText">0 - 0</span></span>
                    </div>
                </div>
            </div>
            <div class="flex flex-col gap-2">
                <select id="switchBando" onchange="renderPaper()" class="bg-white text-black text-[10px] font-bold p-2 rounded-lg">
                    <option value="local">VER LOCAL</option>
                    <option value="visita">VER VISITA</option>
                </select>
                <button onclick="saveGame()" class="bg-emerald-500 text-white text-[10px] font-black p-2 rounded-lg">FINALIZAR JUEGO</button>
            </div>
        </header>

        <div class="score-paper overflow-x-auto p-4 rounded-xl">
            <table class="w-full border-collapse">
                <thead>
                    <tr class="text-[10px] bg-slate-100 uppercase font-black">
                        <th class="border border-slate-300 p-2 w-8">#</th>
                        <th class="border border-slate-300 p-2 text-left w-40">NOMBRE JUGADOR</th>
                        ${Array.from({length: 7}, (_, i) => `<th class="border border-slate-300 p-2 w-12">${i+1}</th>`).join('')}
                        <th class="border border-slate-300 p-2 w-10 bg-blue-50">VB</th>
                        <th class="border border-slate-300 p-2 w-10 bg-red-50">H</th>
                    </tr>
                </thead>
                <tbody id="paperBody"></tbody>
            </table>
        </div>
    </div>

    <div id="actionModal" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-3xl w-full max-w-sm text-center">
            <h3 class="font-black uppercase italic text-sm mb-6">Anotar Jugada para: <span id="batterName" class="text-red-600">--</span></h3>
            <div class="grid grid-cols-3 gap-3">
                <button onclick="record('H')" class="bg-blue-600 text-white p-3 rounded-xl font-bold">H</button>
                <button onclick="record('2B')" class="bg-blue-600 text-white p-3 rounded-xl font-bold">2B</button>
                <button onclick="record('3B')" class="bg-blue-600 text-white p-3 rounded-xl font-bold">3B</button>
                <button onclick="record('HR')" class="bg-red-600 text-white p-3 rounded-xl font-bold">HR</button>
                <button onclick="record('BB')" class="bg-slate-700 text-white p-3 rounded-xl font-bold">BB</button>
                <button onclick="record('K')" class="bg-black text-white p-3 rounded-xl font-bold">K</button>
                <button onclick="record('OUT')" class="bg-slate-400 text-white p-3 rounded-xl font-bold">OUT</button>
                <button onclick="record('E')" class="bg-orange-500 text-white p-3 rounded-xl font-bold">E</button>
                <button onclick="record('FC')" class="bg-amber-600 text-white p-3 rounded-xl font-bold">FC</button>
            </div>
            <button onclick="record('C')" class="w-full mt-4 bg-red-100 text-red-600 p-4 rounded-2xl font-black border-2 border-red-200">ANOTAR CARRERA (C)</button>
            <button onclick="closeModal()" class="mt-4 text-[10px] font-bold text-slate-400 uppercase">Cancelar</button>
        </div>
    </div>

    <script>
        const API = "https://ley57.onrender.com/api";
        let activeMatch = null;
        let rosters = { local: [], visita: [] };
        let sessionStats = {}; 
        let currentBases = [false, false, false];
        let score = { L: 0, V: 0 };
        let outs = 0;
        let selectedTarget = null; // {playerId, inning}

        // FASE 1
        async function getGames() {
            const liga = document.getElementById('liga').value;
            const res = await fetch(`${API}/games?liga=${liga}&status=pendiente`);
            const data = await res.json();
            document.getElementById('juego').innerHTML = data.map(g => `<option value="${g._id}" data-loc="${g.local}" data-vis="${g.visita}">${g.local} VS ${g.visita}</option>`).join('');
        }

        async function loadRosters() {
            const sel = document.getElementById('juego');
            const opt = sel.options[sel.selectedIndex];
            activeMatch = { id: sel.value, local: opt.getAttribute('data-loc'), visita: opt.getAttribute('data-vis') };

            const [rL, rV] = await Promise.all([
                fetch(`${API}/players?equipo=${encodeURIComponent(activeMatch.local)}`),
                fetch(`${API}/players?equipo=${encodeURIComponent(activeMatch.visita)}`)
            ]);
            rosters.local = await rL.json();
            rosters.visita = await rV.json();

            // Abrir selector de lineup
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('lineupPicker').classList.remove('hidden');
            showChecklist('local');
        }

        function showChecklist(team) {
            document.getElementById('teamNamePicker').innerText = activeMatch[team].toUpperCase();
            const cont = document.getElementById('playerChecklist');
            cont.innerHTML = rosters[team].map(p => `
                <label class="flex items-center gap-2 p-3 bg-slate-50 rounded-xl cursor-pointer">
                    <input type="checkbox" value="${p._id}" class="w-5 h-5 p-check" checked>
                    <span class="text-[10px] font-bold uppercase">${p.nombre}</span>
                </label>
            `).join('');
        }

        let lineupLocal = []; let lineupVisita = [];
        function confirmLineup() {
            const checked = Array.from(document.querySelectorAll('.p-check:checked')).map(i => i.value);
            const team = document.getElementById('teamNamePicker').innerText.toLowerCase() === activeMatch.local.toLowerCase() ? 'local' : 'visita';
            
            if(team === 'local') {
                lineupLocal = rosters.local.filter(p => checked.includes(p._id));
                showChecklist('visita');
            } else {
                lineupVisita = rosters.visita.filter(p => checked.includes(p._id));
                [...lineupLocal, ...lineupVisita].forEach(p => sessionStats[p._id] = { ab: 0, h: 0, cels: Array(7).fill('') });
                document.getElementById('lineupPicker').classList.add('hidden');
                document.getElementById('scoreSheet').classList.remove('hidden');
                document.getElementById('headerTeams').innerText = `${activeMatch.local} VS ${activeMatch.visita}`;
                renderPaper();
            }
        }

        // FASE 3: DIBUJAR HOJA
        function renderPaper() {
            const bando = document.getElementById('switchBando').value;
            const players = bando === 'local' ? lineupLocal : lineupVisita;
            const body = document.getElementById('paperBody');

            body.innerHTML = players.map((p, i) => `
                <tr class="border-b">
                    <td class="border border-slate-300 p-2 text-center text-slate-400 font-bold">${i+1}</td>
                    <td class="border border-slate-300 p-2 font-black uppercase text-blue-900 text-[10px]">${p.nombre}</td>
                    ${sessionStats[p._id].cels.map((content, inn) => `
                        <td class="border border-slate-300 cell" onclick="openAction('${p._id}', ${inn}, '${p.nombre}')">
                            <div class="diamond-cell ${content.includes('C') ? 'active' : ''}"></div>
                            <span class="z-10 ${content.includes('C') ? 'text-white' : ''}">${content.replace('/C', '')}</span>
                        </td>
                    `).join('')}
                    <td class="border border-slate-300 p-2 text-center bg-blue-50 font-black">${sessionStats[p._id].ab}</td>
                    <td class="border border-slate-300 p-2 text-center bg-red-50 font-black">${sessionStats[p._id].h}</td>
                </tr>
            `).join('');
        }

        function openAction(pid, inn, name) {
            selectedTarget = { pid, inn };
            document.getElementById('batterName').innerText = name;
            document.getElementById('actionModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('actionModal').classList.add('hidden'); }

        function record(tipo) {
            const { pid, inn } = selectedTarget;
            
            if(tipo === 'C') {
                sessionStats[pid].cels[inn] = sessionStats[pid].cels[inn] ? sessionStats[pid].cels[inn] + '/C' : 'C';
                const bando = document.getElementById('switchBando').value;
                if(bando === 'local') score.L++; else score.V++;
            } else {
                sessionStats[pid].cels[inn] = tipo;
                if(['H','2B','3B','HR'].includes(tipo)) {
                    sessionStats[pid].ab++; sessionStats[pid].h++;
                    advance(tipo);
                } else if (['OUT','K'].includes(tipo)) {
                    sessionStats[pid].ab++; outs++;
                } else {
                    advance('H');
                }
            }

            if(outs >= 3) { alert("¡Cambio de Inning!"); outs = 0; currentBases = [false,false,false]; }
            
            updateUI();
            closeModal();
            renderPaper();
        }

        function advance(tipo) {
            if(tipo === 'H') {
                if(currentBases[2]) currentBases[2] = false;
                if(currentBases[1]) { currentBases[2] = true; currentBases[1] = false; }
                if(currentBases[0]) currentBases[1] = true;
                currentBases[0] = true;
            } else if (tipo === 'HR') {
                currentBases = [false,false,false];
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('outText').innerText = outs;
            document.getElementById('scoreText').innerText = `${score.L} - ${score.V}`;
            for(let i=0; i<3; i++) {
                document.getElementById(`f${i+1}`).className = currentBases[i] ? `b-spot b${i+1}-spot occupied` : `b-spot b${i+1}-spot`;
            }
        }

        async function saveGame() {
            if(!confirm("¿Guardar estadísticas finales?")) return;
            for(let pid in sessionStats) {
                const s = sessionStats[pid];
                if(s.ab > 0) {
                    const p = await (await fetch(`${API}/players/${pid}`)).json();
                    await fetch(`${API}/players/${pid}`, {
                        method: 'PUT',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ jj: (p.jj || 0)+1, vb: (p.vb || 0)+s.ab, h: (p.h || 0)+s.h, avg: (p.h+s.h)/(p.vb+s.ab) || 0 })
                    });
                }
            }
            await fetch(`${API}/games/resultado`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id: activeMatch.id, sL: score.L, sV: score.V, ganador: score.L>score.V?activeMatch.local:activeMatch.visita, perdedor: score.L>score.V?activeMatch.visita:activeMatch.local, status: "finalizado" })
            });
            alert("Juego Guardado."); location.reload();
        }
    </script>
</body>
</html>
