<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anotador Pro Elite v4 - Ley 57</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .paper-bg { background-color: #fff; background-image: radial-gradient(#e2e8f0 1px, transparent 1px); background-size: 20px 20px; }
        .cell-score { min-width: 50px; height: 50px; border: 0.5px solid #cbd5e1; position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 11px; transition: 0.2s; }
        .cell-score:hover { background: #f1f5f9; }
        
        /* DIAMANTE SEPARADO */
        .stadium-container { position: relative; width: 220px; height: 220px; background: #15803d; border: 6px solid #064e3b; transform: rotate(45deg); border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); margin: 20px auto; flex-shrink: 0; }
        .base-spot { position: absolute; width: 26px; height: 26px; background: #fff; border: 3px solid #333; transform: rotate(-45deg); transition: 0.3s; z-index: 20; }
        .base-spot.on { background: #ef4444; border-color: #fff; box-shadow: 0 0 15px #ef4444; }
        
        .runner-tag { position: absolute; transform: rotate(-45deg); background: #000; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 900; white-space: nowrap; pointer-events: none; z-index: 30; border: 1px solid #ef4444; display: none; text-transform: uppercase; }
        .on + .runner-tag { display: block; animation: bounce 0.3s; }

        .b-1 { top: -13px; right: -13px; } .tag-1 { top: -40px; right: -15px; }
        .b-2 { top: -13px; left: -13px; }  .tag-2 { top: -40px; left: -15px; }
        .b-3 { bottom: -13px; left: -13px; }.tag-3 { bottom: -40px; left: -15px; }
        .b-h { bottom: -13px; right: -13px; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }

        .diamond-inner { width: 18px; height: 18px; border: 1px solid #94a3b8; transform: rotate(45deg); position: absolute; pointer-events: none; }
        .diamond-inner.run { background: #ef4444; border-color: #b91c1c; }
        
        .hidden { display: none; }
        @keyframes bounce { from { transform: rotate(-45deg) scale(0.5); } to { transform: rotate(-45deg) scale(1); } }
    </style>
</head>
<body class="bg-slate-200 min-h-screen">

    <div id="fase1" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-[3rem] shadow-2xl w-full max-w-md border-t-[12px] border-blue-900">
            <h1 class="font-black italic uppercase text-2xl text-center mb-6 text-blue-900 tracking-tighter">Anotador Oficial Pro</h1>
            <div class="space-y-4">
                <select id="selLiga" onchange="fetchGames()" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold uppercase outline-none focus:border-blue-900 transition-all">
                    <option value="">-- SELECCIONAR LIGA --</option>
                    <option value="femenil">LEY 57 (FEMENIL)</option>
                    <option value="varonil">ALV SPORT (VARONIL)</option>
                </select>
                <select id="selJuego" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold uppercase outline-none">
                    <option value="">-- ESPERANDO LIGA --</option>
                </select>
                <button onclick="startSetup()" class="w-full bg-blue-900 text-white p-5 rounded-2xl font-black uppercase italic shadow-lg hover:bg-black transition-all">Configurar Rosters</button>
            </div>
        </div>
    </div>

    <div id="fase2" class="hidden max-w-5xl mx-auto p-4 md:p-8">
        <div class="bg-white p-8 rounded-[3rem] shadow-2xl border-t-[12px] border-red-600">
            <h2 class="font-black uppercase text-xl italic text-blue-900 text-center mb-6">Acomodar Lineup: <span id="txtTeamSetup" class="text-red-600">--</span></h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-slate-50 p-5 rounded-3xl border">
                    <h3 class="text-[10px] font-black uppercase mb-4 text-slate-400">Jugadoras Disponibles</h3>
                    <div id="poolPlayers" class="space-y-2 max-h-96 overflow-y-auto pr-2"></div>
                </div>
                <div class="bg-blue-50 p-5 rounded-3xl border border-blue-100 shadow-inner">
                    <h3 class="text-[10px] font-black uppercase mb-4 text-blue-900">Orden al Bat Oficial</h3>
                    <div id="confirmedLineup" class="space-y-2"></div>
                    <button onclick="confirmTeamLineup()" class="w-full mt-6 bg-blue-900 text-white p-4 rounded-2xl font-black uppercase shadow-lg">Confirmar Bando</button>
                </div>
            </div>
        </div>
    </div>

    <div id="fase3" class="hidden flex flex-col gap-6 p-4 md:p-6 animate-pop">
        <header class="bg-blue-900 text-white p-6 rounded-[3rem] shadow-2xl flex flex-col xl:flex-row items-center gap-8 border-b-8 border-red-600">
            <div class="stadium-container">
                <div id="f2" class="base-spot b-2"></div><div id="t2" class="runner-tag tag-2">--</div>
                <div id="f1" class="base-spot b-1"></div><div id="t1" class="runner-tag tag-1">--</div>
                <div id="f3" class="base-spot b-3"></div><div id="t3" class="runner-tag tag-3">--</div>
                <div id="fh" class="base-spot b-h"></div>
            </div>

            <div class="flex-1 w-full">
                <div class="flex flex-col md:flex-row justify-between gap-6">
                    <div>
                        <h2 id="headerVs" class="font-black italic text-2xl md:text-4xl uppercase tracking-tighter text-white">--- VS ---</h2>
                        <div class="flex gap-4 mt-4">
                            <div class="bg-black/40 px-5 py-2 rounded-2xl border border-white/10 text-center">
                                <p class="text-[8px] font-black text-slate-400 uppercase">OUTS</p>
                                <div id="outContainer" class="flex gap-2 mt-1">
                                    <div class="w-4 h-4 rounded-full bg-slate-700"></div>
                                    <div class="w-4 h-4 rounded-full bg-slate-700"></div>
                                </div>
                            </div>
                            <div class="bg-black/40 px-5 py-2 rounded-2xl border border-white/10 text-center">
                                <p class="text-[8px] font-black text-slate-400 uppercase">INNING</p>
                                <p id="inningText" class="font-black text-xl italic text-white">1</p>
                            </div>
                        </div>
                    </div>
                    <div class="text-center md:text-right">
                        <p class="text-[10px] font-black text-slate-400 uppercase">Marcador</p>
                        <p id="txtScore" class="text-6xl font-black italic text-red-500">0 - 0</p>
                    </div>
                </div>
                
                <div class="flex gap-3 mt-6">
                    <select id="switchView" onchange="renderSheet()" class="bg-white text-blue-900 text-xs font-black p-4 rounded-2xl shadow-xl outline-none">
                        <option value="local">LINEUP LOCAL</option>
                        <option value="visita">LINEUP VISITANTE</option>
                    </select>
                    <button onclick="finalizarPartido()" class="bg-emerald-500 text-white text-xs font-black px-8 rounded-2xl shadow-xl uppercase hover:bg-black transition-all">Finalizar Juego</button>
                </div>
            </div>
        </header>

        <div class="bg-white rounded-[3rem] shadow-2xl border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto paper-bg p-6 scroll-smooth">
                <table class="w-full border-collapse">
                    <thead>
                        <tr id="tableHeader" class="bg-slate-100 text-[10px] font-black uppercase text-slate-500 border-b">
                            </tr>
                    </thead>
                    <tbody id="sheetBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="actionModal" class="hidden fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white p-8 rounded-[3.5rem] w-full max-w-sm shadow-2xl border-t-[14px] border-blue-900 text-center">
            <p id="batterTarget" class="font-black uppercase italic text-blue-900 mb-6 text-xl">---</p>
            <div class="grid grid-cols-3 gap-3">
                <button onclick="record('H')" class="bg-blue-600 text-white p-4 rounded-2xl font-black text-xs">H</button>
                <button onclick="record('2B')" class="bg-blue-700 text-white p-4 rounded-2xl font-black text-xs">2B</button>
                <button onclick="record('3B')" class="bg-blue-800 text-white p-4 rounded-2xl font-black text-xs">3B</button>
                <button onclick="record('HR')" class="bg-red-600 text-white p-4 rounded-2xl font-black text-xs col-span-1 shadow-lg">HR</button>
                <button onclick="record('BB')" class="bg-slate-700 text-white p-4 rounded-2xl font-black text-xs">BB</button>
                <button onclick="record('K')" class="bg-black text-white p-4 rounded-2xl font-black text-xs">K</button>
                <button onclick="record('OUT')" class="bg-slate-400 text-white p-4 rounded-2xl font-black text-xs">OUT</button>
                <button onclick="record('E')" class="bg-orange-500 text-white p-4 rounded-2xl font-black text-xs">E</button>
                <button onclick="record('FC')" class="bg-amber-600 text-white p-4 rounded-2xl font-black text-xs">FC</button>
            </div>
            <div class="grid grid-cols-2 gap-2 mt-4">
                <button onclick="record('C')" class="bg-red-100 text-red-600 p-4 rounded-2xl font-black text-[10px] border-2 border-red-200 uppercase italic">Carrera (C)</button>
                <button onclick="ghostRunner()" class="bg-purple-100 text-purple-700 p-4 rounded-2xl font-black text-[10px] border-2 border-purple-200 uppercase italic">Fantasma (2da)</button>
            </div>
            <button onclick="closeModal()" class="w-full mt-6 text-[10px] font-black text-slate-300 uppercase italic">Cerrar</button>
        </div>
    </div>

    <script>
        const API = "https://ley57.onrender.com/api";
        let match = null; let rosters = { local: [], visita: [] };
        let lineups = { local: [], visita: [] };
        let sessionStats = {}; 
        let bases = [null, null, null]; 
        let score = { L: 0, V: 0 };
        let outs = 0; let inning = 1; let totalInnings = 10;
        let selectedAction = null;

        async function fetchGames() {
            const liga = document.getElementById('selLiga').value;
            const res = await fetch(`${API}/games?liga=${liga}&status=pendiente`);
            const data = await res.json();
            document.getElementById('selJuego').innerHTML = data.map(g => `<option value="${g._id}" data-loc="${g.local}" data-vis="${g.visita}">${g.local} VS ${g.visita}</option>`).join('');
        }

        async function startSetup() {
            const sel = document.getElementById('selJuego');
            const opt = sel.options[sel.selectedIndex];
            match = { id: sel.value, local: opt.getAttribute('data-loc'), visita: opt.getAttribute('data-vis'), liga: document.getElementById('selLiga').value };
            const [rL, rV] = await Promise.all([
                fetch(`${API}/players?equipo=${encodeURIComponent(match.local)}`),
                fetch(`${API}/players?equipo=${encodeURIComponent(match.visita)}`)
            ]);
            rosters.local = await rL.json(); rosters.visita = await rV.json();
            document.getElementById('fase1').classList.add('hidden');
            document.getElementById('fase2').classList.remove('hidden');
            setupTeamLineup('local');
        }

        let currentSetup = 'local'; let tempLineup = [];
        function setupTeamLineup(team) {
            currentSetup = team; tempLineup = [];
            document.getElementById('txtTeamSetup').innerText = match[team].toUpperCase();
            document.getElementById('poolPlayers').innerHTML = rosters[team].map(p => `<button onclick="addToLineup('${p._id}', '${p.nombre}')" class="w-full text-left p-3 bg-white border rounded-2xl font-bold uppercase text-[10px] hover:bg-blue-50">+ ${p.nombre}</button>`).join('');
            updateSetupView();
        }

        function addToLineup(id, nombre) {
            if(tempLineup.find(p => p._id === id)) return;
            tempLineup.push({ _id: id, nombre, pos: '' });
            updateSetupView();
        }

        function updateSetupView() {
            document.getElementById('confirmedLineup').innerHTML = tempLineup.map((p, i) => `
                <div class="flex items-center gap-2 bg-white p-3 rounded-2xl shadow-sm border-l-8 border-blue-900">
                    <span class="font-black text-blue-900 w-4">${i+1}</span>
                    <span class="text-[10px] font-black uppercase flex-1">${p.nombre}</span>
                    <input type="text" placeholder="POS" onchange="setPos('${p._id}', this.value)" class="w-10 border rounded text-[10px] text-center font-black" value="${p.pos}">
                    <button onclick="removeLineup('${p._id}')" class="text-red-500 px-2 font-bold">×</button>
                </div>`).join('');
        }

        function setPos(id, val) { const p = tempLineup.find(x => x._id === id); if(p) p.pos = val; }
        function removeLineup(id) { tempLineup = tempLineup.filter(p => p._id !== id); updateSetupView(); }

        function confirmTeamLineup() {
            lineups[currentSetup] = [...tempLineup];
            if(currentSetup === 'local') setupTeamLineup('visita');
            else {
                [...lineups.local, ...lineups.visita].forEach(p => sessionStats[p._id] = { ab: 0, h: 0, hr: 0, cels: Array(25).fill('') });
                document.getElementById('fase2').classList.add('hidden');
                document.getElementById('fase3').classList.remove('hidden');
                document.getElementById('headerVs').innerText = `${match.local} VS ${match.visita}`;
                renderSheet();
            }
        }

        function renderSheet() {
            const bando = document.getElementById('switchView').value;
            const players = lineups[bando];
            if(inning > totalInnings) totalInnings = inning;

            document.getElementById('tableHeader').innerHTML = `
                <th class="p-4 border-r w-12 text-slate-400">#</th>
                <th class="p-4 border-r text-left w-64">JUGADORA</th>
                <th class="p-4 border-r w-12 text-red-600">POS</th>
                ${Array.from({length: totalInnings}, (_, i) => `<th class="p-4 border-r w-14">${i+1}</th>`).join('')}
                <th class="p-4 bg-blue-50 w-12 text-blue-900">VB</th>
                <th class="p-4 bg-red-50 w-12 text-red-600">H</th>
                <th class="p-4 w-12 text-slate-300">OPC</th>`;

            document.getElementById('sheetBody').innerHTML = players.map((p, i) => `
                <tr class="text-[10px] border-b hover:bg-slate-50">
                    <td class="p-4 border-r text-center font-black text-slate-400">${i+1}</td>
                    <td class="p-4 border-r font-black uppercase text-blue-900 italic">${p.nombre}</td>
                    <td class="p-4 border-r text-center font-black text-red-600 bg-slate-50">${p.pos || '--'}</td>
                    ${sessionStats[p._id].cels.slice(0, totalInnings).map((content, inn) => `
                        <td class="border-r cell-score" onclick="openAction('${p._id}', ${inn}, '${p.nombre}')">
                            <div class="diamond-inner ${content.includes('C') ? 'run' : ''}"></div>
                            <span class="z-10 ${content.includes('C') ? 'text-white' : ''}">${content.replace('/C', '')}</span>
                        </td>`).join('')}
                    <td class="p-4 bg-blue-50 font-black text-center">${sessionStats[p._id].ab}</td>
                    <td class="p-4 bg-red-50 font-black text-center">${sessionStats[p._id].h}</td>
                    <td class="p-4 text-center">
                        <button onclick="realizarCambio('${p._id}', '${bando}')" class="text-blue-500 hover:scale-125 transition-transform"><i class="fa fa-exchange-alt"></i></button>
                    </td>
                </tr>`).join('');
        }

        function realizarCambio(idAnterior, bando) {
            const banca = rosters[bando].filter(p => !lineups[bando].find(l => l._id === p._id));
            if(banca.length === 0) return alert("No hay jugadoras en la banca para este equipo.");
            
            const lista = banca.map((p, i) => `${i+1}. ${p.nombre}`).join('\n');
            const seleccion = prompt(`Sustitución para ${lineups[bando].find(p=>p._id===idAnterior).nombre}:\n\n${lista}\n\nEscriba el NÚMERO de la jugadora que entra:`);
            
            if(seleccion) {
                const idx = parseInt(seleccion) - 1;
                if(banca[idx]) {
                    const nueva = banca[idx];
                    const lineupIdx = lineups[bando].findIndex(p => p._id === idAnterior);
                    lineups[bando][lineupIdx] = { _id: nueva._id, nombre: nueva.nombre, pos: lineups[bando][lineupIdx].pos };
                    if(!sessionStats[nueva._id]) sessionStats[nueva._id] = { ab: 0, h: 0, hr: 0, cels: Array(25).fill('') };
                    renderSheet();
                    alert(`Cambio realizado: Sale ${rosters[bando].find(p=>p._id===idAnterior).nombre}, entra ${nueva.nombre}`);
                }
            }
        }

        function openAction(pid, inn, nombre) {
            selectedAction = { pid, inn };
            document.getElementById('batterTarget').innerText = nombre;
            document.getElementById('actionModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('actionModal').classList.add('hidden'); }

        function record(tipo) {
            const { pid, inn } = selectedAction;
            const nombre = document.getElementById('batterTarget').innerText;
            if(tipo === 'C') {
                sessionStats[pid].cels[inn] = sessionStats[pid].cels[inn] ? sessionStats[pid].cels[inn] + '/C' : 'C';
                runScored();
            } else {
                sessionStats[pid].cels[inn] = tipo;
                if(['H','2B','3B','HR'].includes(tipo)) {
                    sessionStats[pid].ab++; sessionStats[pid].h++;
                    if(tipo === 'HR') sessionStats[pid].hr++;
                    moverBases(tipo, nombre);
                } else if(['OUT','K'].includes(tipo)) {
                    sessionStats[pid].ab++; outs++;
                    if(outs >= 3) { alert("¡3 OUTS! CAMBIO DE INNING"); outs = 0; bases = [null,null,null]; inning++; }
                } else { moverBases('H', nombre); }
            }
            updateUI(); closeModal(); renderSheet();
        }

        function ghostRunner() {
            const nombre = document.getElementById('batterTarget').innerText;
            bases[1] = nombre; updateUI(); closeModal();
        }

        function moverBases(tipo, nombre) {
            if(tipo === 'H') {
                if(bases[2]) runScored();
                bases[2] = bases[1]; bases[1] = bases[0]; bases[0] = nombre;
            } else if (tipo === '2B') {
                if(bases[2]) runScored(); if(bases[1]) runScored();
                bases[2] = bases[0]; bases[1] = nombre; bases[0] = null;
            } else if (tipo === '3B') {
                bases.forEach(b => { if(b) runScored(); });
                bases = [null, null, nombre];
            } else if (tipo === 'HR') {
                let r = 1; bases.forEach(b => { if(b) r++; });
                for(let i=0; i<r; i++) runScored();
                bases = [null, null, null];
            }
            updateUI();
        }

        function runScored() {
            const team = document.getElementById('switchView').value;
            if(team === 'local') score.L++; else score.V++;
            document.getElementById('fh').classList.add('bg-yellow-400');
            setTimeout(() => document.getElementById('fh').classList.remove('bg-yellow-400'), 500);
        }

        function updateUI() {
            document.getElementById('outContainer').children[0].className = outs >= 1 ? 'w-4 h-4 rounded-full bg-red-500 shadow-lg' : 'w-4 h-4 rounded-full bg-slate-700';
            document.getElementById('outContainer').children[1].className = outs >= 2 ? 'w-4 h-4 rounded-full bg-red-500 shadow-lg' : 'w-4 h-4 rounded-full bg-slate-700';
            document.getElementById('txtScore').innerText = `${score.L} - ${score.V}`;
            document.getElementById('inningText').innerText = inning;
            for(let i=0; i<3; i++) {
                const spot = document.getElementById(`f${i+1}`);
                const tag = document.getElementById(`t${i+1}`);
                if(bases[i]) { spot.classList.add('on'); tag.innerText = bases[i].split(' ')[0]; }
                else { spot.classList.remove('on'); }
            }
        }

        async function finalizarPartido() {
            if(!confirm("¿Finalizar encuentro?")) return;
            for(let id in sessionStats) {
                const s = sessionStats[id];
                if(s.ab > 0) {
                    const p = await (await fetch(`${API}/players/${id}`)).json();
                    const nVB = (p.vb || 0)+s.ab, nH = (p.h || 0)+s.h;
                    await fetch(`${API}/players/${id}`, {
                        method: 'PUT',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ jj: (p.jj || 0)+1, vb: nVB, h: nH, hr: (p.hr || 0)+s.hr, avg: nVB > 0 ? nH/nVB : 0 })
                    });
                }
            }
            await fetch(`${API}/games/resultado`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id: match.id, sL: score.L, sV: score.V, ganador: score.L>score.V?match.local:match.visita, perdedor: score.L>score.V?match.visita:match.local, status: "finalizado" })
            });
            alert("Juego Guardado."); location.reload();
        }
    </script>
</body>
</html>
