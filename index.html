<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mantenimiento - Liga Ley 57</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @keyframes pulse-red {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        .animate-slow { animation: pulse-red 3s infinite; }
        .bg-custom { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); }
    </style>
</head>
<body class="bg-custom min-h-screen flex items-center justify-center text-white p-6 font-sans">

    <div class="max-w-2xl w-full text-center space-y-8">
        <!-- Logo -->
        <div class="relative inline-block">
            <img src="logoley57icon.jpeg" class="w-32 h-32 mx-auto rounded-full border-4 border-red-600 shadow-2xl animate-slow">
            <div class="absolute -bottom-2 -right-2 bg-red-600 p-2 rounded-full shadow-lg">
                <i class="fa fa-tools text-white"></i>
            </div>
        </div>

        <!-- Título Principal -->
        <div class="space-y-2">
            <h1 class="text-4xl md:text-6xl font-black italic uppercase tracking-tighter">
                Pagina en <span class="text-red-500">Mantenimiento</span>
            </h1>
            <p class="text-slate-400 font-bold uppercase tracking-[0.3em] text-xs">
                Estamos evolucionando para ti
            </p>
        </div>

        <!-- Mensaje de Colaboración -->
        <div class="bg-white/5 backdrop-blur-md border border-white/10 p-6 rounded-3xl space-y-4 shadow-2xl">
            <p class="text-sm md:text-base text-slate-200 leading-relaxed">
                En <span class="font-black text-red-500">FV Digital</span> y <span class="font-black text-blue-400">ALV Sport</span> trabajamos en conjunto para seguir mejorando tu experiencia deportiva.
            </p>
            <div class="h-px bg-gradient-to-r from-transparent via-slate-500 to-transparent opacity-30"></div>
            <p class="font-black italic uppercase text-lg text-yellow-500 tracking-widest">
                Disponible: 15 de Mayo, 2026
            </p>
        </div>

        <!-- Footer / Redes -->
        <div class="pt-8 space-y-4">
            <p class="text-[10px] text-slate-500 uppercase font-black tracking-widest">Sigue el proceso en nuestras redes</p>
            <div class="flex justify-center gap-6">
                <a href="#" class="text-2xl hover:text-red-500 transition-colors"><i class="fab fa-facebook"></i></a>
                <a href="#" class="text-2xl hover:text-red-500 transition-colors"><i class="fab fa-instagram"></i></a>
                <a href="#" class="text-2xl hover:text-red-500 transition-colors"><i class="fab fa-whatsapp"></i></a>
            </div>
        </div>
    </div>

</body>
</html>
