<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lanzamiento Ley 57 & ALV Sport</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta name="google-site-verification" content="kTlA6sW6q_8nCZLBSUb7OV8_hL3P8Py7S4lTmB982Nk"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: #020617;
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020617 100%);
            z-index: -1;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .counter-font { font-family: 'Orbitron', sans-serif; }

        @keyframes pulse-blue {
            0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
            50% { box-shadow: 0 0 40px rgba(59, 130, 246, 0.5); }
        }

        .glow-active { animation: pulse-blue 3s infinite; }

        .fade-up { animation: fadeUp 0.8s ease-out forwards; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8">

    <div class="bg-glow"></div>

    <main id="espera" class="w-full max-w-5xl text-center fade-up">
        
        <div class="flex flex-col sm:flex-row items-center justify-center gap-6 md:gap-10 mb-12">
            <img src="fv_digital_logo.png.webp" alt="Ley 57" class="h-20 md:h-28 object-contain">
            <div class="hidden sm:block h-12 w-px bg-white/20"></div>
            <img src="logoalvnegro.jpeg" alt="ALV Sport" class="h-16 md:h-24 rounded-full border border-white/10 shadow-2xl">
        </div>

        <div class="space-y-4 mb-12">
            <h2 class="text-blue-400 font-bold tracking-[0.3em] text-xs md:text-sm uppercase">Gran Apertura de Temporada</h2>
            <h1 class="text-4xl sm:text-6xl md:text-8xl font-black tracking-tighter leading-none">
                ESTAMOS LISTOS <br> <span class="text-gray-400">PARA TI</span>
            </h1>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-6 max-w-3xl mx-auto">
            <div class="glass p-5 md:p-8 rounded-3xl">
                <span id="days" class="counter-font text-3xl md:text-6xl font-bold block">00</span>
                <span class="text-[10px] md:text-xs text-gray-500 uppercase tracking-widest mt-2 block">Días</span>
            </div>
            <div class="glass p-5 md:p-8 rounded-3xl">
                <span id="hours" class="counter-font text-3xl md:text-6xl font-bold block">00</span>
                <span class="text-[10px] md:text-xs text-gray-500 uppercase tracking-widest mt-2 block">Horas</span>
            </div>
            <div class="glass p-5 md:p-8 rounded-3xl">
                <span id="minutes" class="counter-font text-3xl md:text-6xl font-bold block">00</span>
                <span class="text-[10px] md:text-xs text-gray-500 uppercase tracking-widest mt-2 block">Minutos</span>
            </div>
            <div class="glass p-5 md:p-8 rounded-3xl border-blue-500/40 glow-active">
                <span id="seconds" class="counter-font text-3xl md:text-6xl font-bold block text-blue-500">00</span>
                <span class="text-[10px] md:text-xs text-blue-400 uppercase tracking-widest mt-2 block font-bold italic">Segundos</span>
            </div>
        </div>

        <footer class="mt-16 opacity-40">
            <p class="text-xs tracking-[0.2em]">FV DIGITAL × ALV SPORT × LEY 57</p>
        </footer>
    </main>

    <div id="revelacion" class="hidden w-full max-w-4xl text-center px-4">
        <div class="mb-6 inline-block p-4 rounded-full bg-blue-500/10 fade-up">
            <i class="fa-solid fa-check-double text-5xl md:text-7xl text-blue-500"></i>
        </div>
        <h1 class="text-5xl md:text-8xl font-black mb-6 tracking-tighter fade-up">¡SISTEMA <br> ACTIVADO!</h1>
        <p class="text-lg md:text-2xl text-gray-400 mb-10 fade-up" style="animation-delay: 0.2s;">Bienvenido a la nueva era de la Liga Ley 57.</p>
        
        <div class="fade-up" style="animation-delay: 0.4s;">
            <a href="index_post.html" class="inline-flex items-center justify-center gap-3 bg-white text-black px-10 py-5 rounded-full font-black text-xl md:text-2xl hover:bg-blue-500 hover:text-white transition-all transform hover:scale-105 active:scale-95 shadow-[0_0_30px_rgba(255,255,255,0.2)]">
                ENTRAR AL DIAMANTE <i class="fa-solid fa-arrow-right"></i>
            </a>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN: De hoy 10 al 12 de Mayo de 2026
        const fechaLimite = new Date("May 12, 2026 19:30:00").getTime();

        const x = setInterval(function() {
            const ahora = new Date().getTime();
            const distancia = fechaLimite - ahora;

            // Cálculos de tiempo
            const d = Math.floor(distancia / (1000 * 60 * 60 * 24));
            const h = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distancia % (1000 * 60)) / 1000);

            // Mostrar resultados con ceros a la izquierda
            document.getElementById("days").innerHTML = d.toString().padStart(2, '0');
            document.getElementById("hours").innerHTML = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerHTML = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerHTML = s.toString().padStart(2, '0');

            // Si el tiempo termina
            if (distancia < 0) {
                clearInterval(x);
                document.getElementById("espera").classList.add("hidden");
                const rev = document.getElementById("revelacion");
                rev.classList.remove("hidden");
                rev.classList.add("fade-up");
                if ("vibrate" in navigator) navigator.vibrate(500);
            }
        }, 1000);
    </script>
</body>
</html>
