<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Suspendida - Ley 57</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        body {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #111827, #020617);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            animation: float 4s ease-in-out infinite;
            max-width: 90%;
            width: 500px;
        }

        .status-dot {
            height: 12px;
            width: 12px;
            background-color: #ef4444;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px #ef4444;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="mb-6">
            <span class="status-dot"></span>
            <span class="text-xs uppercase tracking-widest text-gray-400">Estado del Sistema: Offline</span>
        </div>

        <h1 class="text-4xl md:text-5xl font-black mb-4 tracking-tighter bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">
            PÁGINA SUSPENDIDA
        </h1>

        <div class="w-16 h-1 bg-red-500 mx-auto mb-6"></div>

        <p class="text-lg text-gray-300 font-light">
            Lo siento, la página sigue teniendo problemas de carga.
        </p>
        
        <p class="mt-8 text-sm text-gray-500 italic">
            Estamos trabajando para restablecer el servicio de la Liga Ley 57 & ALV Sport pronto.
        </p>

        <div class="mt-10">
            <div class="text-xs text-gray-600">
                &copy; 2026 FV Digital . Sports Central Hub
            </div>
        </div>
    </div>

</body>
</html>
