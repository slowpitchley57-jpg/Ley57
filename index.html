<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal LEY 57 & ALV SPORT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .card-hover { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card-hover:hover { transform: translateY(-10px); }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-5xl w-full grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <div onclick="location.href='estadisticas.html'" class="card-hover cursor-pointer bg-white rounded-[2.5rem] overflow-hidden shadow-2xl group">
            <div class="h-64 bg-blue-900 flex items-center justify-center p-8 relative">
                <img src="imgley57.pgn.png" class="h-40 z-10">
                <div class="absolute inset-0 bg-blue-800 opacity-0 group-hover:opacity-20 transition-opacity"></div>
            </div>
            <div class="p-8 text-center">
                <h2 class="text-3xl font-black text-blue-900 italic uppercase">LEY 57</h2>
                <p class="text-slate-400 font-bold uppercase tracking-widest text-sm mt-2">Liga Softbol Femenil</p>
                <div class="mt-6 inline-block bg-blue-900 text-white px-6 py-2 rounded-full font-black text-xs uppercase italic">Entrar</div>
            </div>
        </div>

        <div onclick="location.href='alv_sport.html'" class="card-hover cursor-pointer bg-white rounded-[2.5rem] overflow-hidden shadow-2xl group">
            <div class="h-64 bg-red-600 flex items-center justify-center p-8 relative">
                <i class="fa fa-medal text-white text-8xl z-10"></i>
                <div class="absolute inset-0 bg-black opacity-0 group-hover:opacity-20 transition-opacity"></div>
            </div>
            <div class="p-8 text-center">
                <h2 class="text-3xl font-black text-red-600 italic uppercase">ALV SPORT</h2>
                <p class="text-slate-400 font-bold uppercase tracking-widest text-sm mt-2">Easy Pitch Varonil</p>
                <div class="mt-6 inline-block bg-red-600 text-white px-6 py-2 rounded-full font-black text-xs uppercase italic">Entrar</div>
            </div>
        </div>

    </div>

    <div class="absolute bottom-8 text-slate-500">
        <a href="login.html" class="text-[10px] uppercase font-black tracking-[0.3em] hover:text-white transition italic">Acceso Administrativo</a>
    </div>

</body>
</html>
