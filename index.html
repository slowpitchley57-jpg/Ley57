<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso - Liga Slow Picht Ley 57</title>
    <link rel="icon" type="image/png" href="logoley57icon.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Gradiente de fondo que se mueve lento */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(-45deg, #0f172a, #1e3a8a, #0f172a, #831843);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        .active-role { 
            background-color: #ef4444 !important; 
            color: white !important; 
            box-shadow: 0 4px 20px 0 rgba(239, 68, 68, 0.5); 
        }

        /* Contenedor del Login */
        .login-card {
            background-color: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            border-top: 8px solid #ef4444;
            z-index: 20;
        }

        /* Estilo para los elementos flotantes (Pelotas/Trofeos) */
        .floating-item {
            position: absolute;
            pointer-events: none;
            color: rgba(255, 255, 255, 0.15); /* Opacidad para que no estorbe la vista */
            z-index: 1;
        }

        .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 font-sans relative">

    <div id="animation-container" class="absolute inset-0 overflow-hidden"></div>

    <div class="login-card p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center relative animate-fade-in">
        
        <img src="logoley57icon.jpeg" alt="Liga Ley 57" class="mx-auto mb-6 w-36 h-36 object-contain drop-shadow-2xl hover:rotate-6 transition-transform duration-500">
        
        <h2 class="text-blue-900 text-3xl font-black mb-1 italic tracking-tighter uppercase leading-none">Slow Picht  Ley 57</h2>
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.4em] mb-8">Hermosillo • Softbol Slowpitch</p>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.4em] mb-8">Femenil</p>


        <div class="flex bg-slate-100 p-1.5 rounded-2xl mb-6 border border-slate-200">
            <button onclick="setRole('jugadora')" id="btn-jugadora" class="flex-1 py-3 text-[10px] font-black rounded-xl transition-all duration-300 active-role uppercase">Público</button>
            <button onclick="setRole('manager')" id="btn-manager" class="flex-1 py-3 text-[10px] font-black rounded-xl transition-all duration-300 text-slate-400 uppercase">Manager</button>
            <button onclick="setRole('admin')" id="btn-admin" class="flex-1 py-3 text-[10px] font-black rounded-xl transition-all duration-300 text-slate-400 uppercase">Admin</button>
        </div>

        <div id="login-fields" class="hidden space-y-4 mb-6">
            <div class="relative">
                <i class="fa fa-user absolute left-4 top-4 text-slate-300"></i>
                <input type="text" id="u" placeholder="Correo" class="w-full p-4 pl-12 rounded-2xl bg-slate-50 border border-slate-200 text-blue-900 font-bold text-sm outline-none focus:border-red-500 transition-all">
            </div>
            <div class="relative">
                <i class="fa fa-lock absolute left-4 top-4 text-slate-300"></i>
                <input type="password" id="p" placeholder="Contraseña" class="w-full p-4 pl-12 rounded-2xl bg-slate-50 border border-slate-200 text-blue-900 font-bold text-sm outline-none focus:border-red-500 transition-all">
            </div>
        </div>

        <div id="msg-jugadora" class="py-6 text-slate-500 text-xs font-medium italic px-4">
            <i class="fa fa-chart-line text-blue-600 mr-2"></i>Consulta Resultados, Estadisticas , Tablas y Rol de Juegos en vivo.
        </div>
        
        <button onclick="entrar()" class="w-full bg-blue-900 hover:bg-red-600 text-white font-black py-4 rounded-2xl transition-all duration-500 shadow-xl uppercase tracking-widest text-xs">
            Ingresar al Portal
        </button>

        <div class="mt-8 pt-6 border-t border-slate-100 flex justify-between items-center px-2">
            <p class="text-slate-400 text-[8px] uppercase font-black tracking-widest">          Temporada 1 - 2026</p>
            <div class="flex gap-2">
                <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                <p class="text-slate-400 text-[8px] uppercase font-black">En línea</p>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('animation-container');
        const icons = ['fa-baseball-ball', 'fa-trophy', 'fa-medal', 'fa-star'];
        const itemsCount = 25; // Cantidad de objetos flotando

        function createItem() {
            const item = document.createElement('i');
            const iconClass = icons[Math.floor(Math.random() * icons.length)];
            
            item.className = `fa ${iconClass} floating-item`;
            
            // Tamaño aleatorio
            const size = Math.random() * 60 + 20;
            item.style.fontSize = `${size}px`;
            
            // Posición inicial aleatoria
            let x = Math.random() * window.innerWidth;
            let y = Math.random() * window.innerHeight;
            
            // Velocidad aleatoria
            let speedX = (Math.random() - 0.5) * 2;
            let speedY = (Math.random() - 0.5) * 2;
            let rotation = 0;
            const rotationSpeed = (Math.random() - 0.5) * 4;

            container.appendChild(item);

            function move() {
                x += speedX;
                y += speedY;
                rotation += rotationSpeed;

                // Rebotar en bordes
                if (x < -100 || x > window.innerWidth + 100) speedX *= -1;
                if (y < -100 || y > window.innerHeight + 100) speedY *= -1;

                item.style.transform = `translate(${x}px, ${y}px) rotate(${rotation}deg)`;
                requestAnimationFrame(move);
            }

            move();
        }

        // Crear los elementos iniciales
        for (let i = 0; i < itemsCount; i++) {
            createItem();
        }
    </script>

    <script>
        let selectedRole = 'jugadora';
       // Busca esta línea y cámbiala en los 4 archivos
const API = "https://ley57.onrender.com/api";

        function setRole(role) {
            selectedRole = role;
            ['jugadora', 'manager', 'admin'].forEach(r => {
                const btn = document.getElementById(`btn-${r}`);
                btn.classList.remove('active-role');
                btn.classList.add('text-slate-400');
            });
            const activeBtn = document.getElementById(`btn-${role}`);
            activeBtn.classList.add('active-role');
            activeBtn.classList.remove('text-slate-400');

            const fields = document.getElementById('login-fields');
            const msg = document.getElementById('msg-jugadora');
            if (role === 'jugadora') {
                fields.classList.add('hidden');
                msg.classList.remove('hidden');
            } else {
                fields.classList.remove('hidden');
                msg.classList.add('hidden');
            }
        }

        async function entrar() {
            if (selectedRole === 'jugadora') { window.location.href = 'estadisticas.html'; return; }
            const usuario = document.getElementById('u').value;
            const password = document.getElementById('p').value;
            if(!usuario || !password) return alert("Ingresa tus datos.");

            try {
                const res = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ correo: usuario, pass: password })
                });
                if(res.ok) {
                    const user = await res.json();
                    if (user.rol !== selectedRole) { alert("Rol incorrecto."); return; }
                    localStorage.setItem('userLogueado', JSON.stringify(user));
                    window.location.href = `${selectedRole}.html`;
                } else { alert("Credenciales incorrectas."); }
            } catch (err) { alert("Servidor offline."); }
        }
    </script>
</body>
</html>
