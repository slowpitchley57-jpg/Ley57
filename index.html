<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mantenimiento - FV Digital & ALV Sport</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #020617; }

    /* Animaciones */
    .fade-in { animation: fadeIn 1.2s ease-out forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .bg-animate { animation: float 15s ease-in-out infinite; }
    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(40px, -40px); }
    }

    /* Brillo en el borde del contenedor */
    .border-glow {
      position: relative;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 2rem;
      overflow: hidden;
    }
    .border-glow::before {
      content: "";
      position: absolute;
      inset: -2px;
      background: linear-gradient(90deg, #ef4444, #3b82f6, #10b981, #ef4444);
      background-size: 400% 400%;
      z-index: -1;
      animation: moveGradient 8s linear infinite;
      opacity: 0.3;
    }
    @keyframes moveGradient {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    /* Partículas de fondo */
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: white;
      border-radius: 50%;
      opacity: 0.2;
      animation: rise 10s infinite ease-in;
    }
    @keyframes rise {
      from { transform: translateY(100vh); opacity: 0.5; }
      to { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center text-white p-6 overflow-hidden relative">

  <!-- Elementos de Fondo -->
  <div class="absolute inset-0 z-0">
    <div class="absolute top-[-10%] left-[-5%] w-[50%] h-[50%] bg-blue-600/20 rounded-full blur-[120px] bg-animate"></div>
    <div class="absolute bottom-[-10%] right-[-5%] w-[50%] h-[50%] bg-red-600/20 rounded-full blur-[120px] bg-animate" style="animation-delay: -5s;"></div>
    
    <!-- Partículas Generadas -->
    <div class="particle" style="left: 10%; animation-duration: 8s;"></div>
    <div class="particle" style="left: 30%; animation-duration: 12s; animation-delay: 2s;"></div>
    <div class="particle" style="left: 70%; animation-duration: 10s; animation-delay: 5s;"></div>
    <div class="particle" style="left: 90%; animation-duration: 15s; animation-delay: 1s;"></div>
  </div>

  <div class="max-w-3xl w-full text-center space-y-12 z-10 fade-in">

    <!-- Logo con sombra de profundidad -->
    <div class="relative inline-block group">
      <div class="absolute inset-0 bg-white/10 blur-3xl rounded-full scale-125 opacity-50 group-hover:opacity-80 transition-opacity"></div>
      <img src="logoalvnegro.jpeg" alt="Logo ALV Sport" class="relative w-32 h-32 sm:w-48 sm:h-48 md:w-56 md:h-56 mx-auto object-cover rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] transform group-hover:scale-105 transition-transform duration-500">
    </div>

    <!-- Título Principal -->
    <div class="space-y-4">
      <h1 class="text-4xl sm:text-6xl md:text-7xl font-black uppercase italic tracking-tighter leading-none">
        EVOLUCIONANDO <br>
        <span class="text-transparent bg-clip-text bg-gradient-to-r from-red-500 via-orange-400 to-yellow-500">PARA LA VICTORIA</span>
      </h1>
      <p class="text-slate-400 font-bold uppercase tracking-[0.5em] text-[10px] sm:text-xs">
        Mantenimiento en curso . FV Digital & ALV Sport
      </p>
    </div>

    <!-- Contenedor Glassmorphism -->
    <div class="border-glow p-8 sm:p-12 shadow-2xl backdrop-blur-2xl mx-2">
      <div class="space-y-6">
        <h2 class="text-xl sm:text-2xl font-bold text-white italic uppercase tracking-widest">Estamos cocinando algo grande</h2>
        <p class="text-sm sm:text-lg text-slate-300 font-light leading-relaxed">
          Nuestros ingenieros están actualizando los sistemas para ofrecerte la plataforma de estadísticas más potente de Sonora. 
          <span class="block mt-4 font-bold text-white">Gracias por ser parte de esta nueva era.</span>
        </p>
        
        <!-- Barra de progreso decorativa -->
        <div class="w-full h-1 bg-white/10 rounded-full overflow-hidden">
            <div class="h-full bg-gradient-to-r from-red-600 to-blue-600 animate-[moveGradient_3s_infinite]" style="width: 70%;"></div>
        </div>
      </div>
    </div>

    <!-- Social & Footer -->
    <div class="flex flex-col items-center gap-8">
      <div class="flex gap-8">
        <a href="https://www.facebook.com/profile.php?id=61582026590626" class="p-3 rounded-full bg-white/5 border border-white/10 hover:bg-white/10 hover:border-red-500 transition-all transform hover:-translate-y-2">
          <i class="fab fa-facebook-f text-xl text-slate-300"></i>
        </a>
        <a href="https://www.instagram.com/alv.sport57/" class="p-3 rounded-full bg-white/5 border border-white/10 hover:bg-white/10 hover:border-pink-500 transition-all transform hover:-translate-y-2">
          <i class="fab fa-instagram text-xl text-slate-300"></i>
        </a>
        <a href="https://wa.me/526624499222" class="p-3 rounded-full bg-white/5 border border-white/10 hover:bg-white/10 hover:border-green-500 transition-all transform hover:-translate-y-2">
          <i class="fab fa-whatsapp text-xl text-slate-300"></i>
        </a>
      </div>
      <p class="text-[9px] text-slate-500 font-black uppercase tracking-[0.5em] flex items-center gap-2">
        <span class="w-2 h-2 bg-red-600 rounded-full animate-ping"></span> Hermosillo, Sonora 2026
      </p>
    </div>
  </div>

</body>
</html>
