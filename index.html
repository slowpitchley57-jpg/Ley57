<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal LEY 57 & ALV SPORT - Powered by FV Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .card-hover { transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card-hover:hover { transform: translateY(-15px) scale(1.02); }
        
        /* Textura de Carbono Profesional */
        .bg-carbon {
            background-color: #0f172a;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }
        
        /* Efecto de Brillo para las tarjetas */
        .shine {
            position: relative;
            overflow: hidden;
        }
        .shine::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            transition: 0.8s;
        }
        .card-hover:hover .shine::after {
            left: 120%;
        }
    </style>
</head>
<body class="bg-carbon min-h-screen flex flex-col items-center p-6 font-sans text-white">

    <header class="w-full max-w-7xl mx-auto py-16 mb-8 flex flex-col items-center border-b border-slate-800/50 relative overflow-hidden">
        
        <div class="absolute inset-0 pointer-events-none">
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 h-80 bg-white/5 blur-[120px] rounded-full"></div>
        </div>

        <div class="relative z-10 flex flex-col items-center gap-8">
            
            <div class="group relative">
                <div class="absolute inset-0 bg-white/10 blur-3xl rounded-full scale-110 opacity-100 group-hover:bg-white/20 transition-all duration-700"></div>
                
                <img src="logoalvnegro.jpeg" 
                     class="h-32 md:h-48 object-contain drop-shadow-[0_0_20px_rgba(255,255,255,0.1)] transition-all duration-700 transform group-hover:scale-105 relative z-10" 
                     alt="ALV Sport Logo">
            </div>

            <div class="text-center">
                <div class="flex items-center justify-center gap-4 mb-3">
                    <span class="h-[1px] w-12 md:w-20 bg-gradient-to-r from-transparent to-red-600"></span>
                    <span class="text-white text-[12px] md:text-[14px] font-black uppercase tracking-[1em] md:tracking-[1.5em] opacity-90 drop-shadow-sm ml-2">
                        PRESENTA
                    </span>
                    <span class="h-[1px] w-12 md:w-20 bg-gradient-to-l from-transparent to-red-600"></span>
                </div>
                
                <div class="h-1.5 w-24 bg-red-600 mx-auto rounded-full shadow-[0_0_15px_rgba(220,38,38,0.6)]"></div>
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center w-full py-10">
        <div class="max-w-6xl w-full grid grid-cols-1 md:grid-cols-2 gap-10">
            
            <div onclick="location.href='estadisticas.html'" class="card-hover cursor-pointer bg-white rounded-[3rem] overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.3)] group border-4 border-transparent hover:border-blue-500 transition-all">
                <div class="h-72 bg-gradient-to-br from-blue-800 to-blue-950 flex items-center justify-center p-10 relative shine text-white">
                    <img src="imgley57.pgn.png" class="h-44 z-10 drop-shadow-2xl">
                    <div class="absolute top-4 right-6 text-white/10 text-6xl font-black italic">SLOW PCIHT</div>
                </div>
                <div class="p-10 text-center">
                    <h2 class="text-4xl font-black text-blue-900 italic uppercase tracking-tighter leading-none">Slow Pitch LEY 57</h2>
                    <p class="text-slate-400 font-bold uppercase tracking-[0.2em] text-[10px] mt-3">Liga Slow ALV</p>
                    <div class="mt-8 inline-flex items-center gap-2 bg-blue-900 text-white px-8 py-3 rounded-full font-black text-xs uppercase italic group-hover:bg-red-600 transition-colors">
                        Ver Estadísticas <i class="fa fa-arrow-right text-[10px]"></i>
                    </div>
                </div>
            </div>

            <div onclick="location.href='alv_sport.html'" class="card-hover cursor-pointer bg-zinc-900 rounded-[3rem] overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.5)] group border-4 border-transparent hover:border-red-600 transition-all">
                <div class="h-72 bg-[#111] flex items-center justify-center p-10 relative shine border-b border-white/5" style="background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');">
                    <img src="alv_sport_logo.png.jpeg" class="h-44 z-10 drop-shadow-[0_0_20px_rgba(239,68,68,0.3)]">
                    <div class="absolute top-4 right-6 text-white/5 text-6xl font-black italic">ALV SPORTS</div>
                </div>
                <div class="p-10 text-center text-white">
                    <h2 class="text-4xl font-black italic uppercase tracking-tighter leading-none">ALV <span class="text-red-600">SPORT</span></h2>
                    <p class="text-zinc-500 font-bold uppercase tracking-[0.2em] text-[10px] mt-3">EASY PITCH</p>
                    <div class="mt-8 inline-flex items-center gap-2 bg-red-600 text-white px-8 py-3 rounded-full font-black text-xs uppercase italic group-hover:bg-white group-hover:text-red-600 transition-colors">
                        Ver Estadísticas <i class="fa fa-arrow-right text-[10px]"></i>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="w-full max-w-7xl mx-auto py-16 mt-10 border-t border-slate-800 flex flex-col items-center">
        
        <a href="login.html" class="group flex items-center gap-3 text-slate-500 hover:text-red-500 transition-all mb-12">
            <span class="h-[1px] w-6 bg-slate-700 group-hover:bg-red-600 transition-all"></span>
            <span class="text-[9px] uppercase font-black tracking-[0.4em] italic">Acceso Administrativo</span>
            <span class="h-[1px] w-6 bg-slate-700 group-hover:bg-red-600 transition-all"></span>
        </a>

        <div class="flex flex-col items-center gap-4 mb-6">
            <p class="text-[10px] uppercase font-black text-slate-400 tracking-[0.6em] opacity-40">Desarrollado por</p>
            <div class="relative group">
                <div class="absolute inset-0 bg-blue-500/20 blur-3xl rounded-full opacity-0 group-hover:opacity-100 transition-opacity duration-700"></div>
                <img src="fv_digital_logo.png.webp" 
                     class="h-24 md:h-32 relative z-10 drop-shadow-[0_0_20px_rgba(255,255,255,0.1)] hover:drop-shadow-[0_0_30px_rgba(59,130,246,0.5)] transition-all duration-500 transform hover:scale-110"
                     alt="FV Digital Logo">
            </div>
        </div>

        <div class="text-center">
            <p class="text-white text-sm font-black italic uppercase tracking-tighter leading-none">
                FV <span class="text-red-600">Digital</span>
            </p>
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.3em] mt-2">
                © 2026 Software Engineering
            </p>
        </div>
    </footer>

</body>
</html>
