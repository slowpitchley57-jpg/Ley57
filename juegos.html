<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Oficial | LEY 57 & ALV SPORT</title>
    <link rel="icon" type="image/jpeg" href="logoalvnegro.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; }
        .bg-carbon { background-image: radial-gradient(circle at top right, #1e293b, transparent), url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .filter-btn.active { background-color: #dc2626; color: white; box-shadow: 0 0 20px rgba(220, 38, 38, 0.4); }
        
        /* Animaciones de Entrada */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .reveal { animation: fadeInUp 0.6s ease-out forwards; opacity: 0; }
        
        #modalDetails { display: none; backdrop-filter: blur(15px); z-index: 100; }
        .modal-anim { animation: modalShow 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes modalShow { from { opacity: 0; scale: 0.9; } to { opacity: 1; scale: 1; } }

        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #dc2626; border-radius: 10px; }
    </style>
</head>
<body class="bg-carbon min-h-screen pb-20 custom-scroll">

    <header class="p-6 flex justify-between items-center max-w-7xl mx-auto reveal" style="animation-delay: 0.1s">
        <a href="index.html" class="text-white/50 hover:text-white transition-colors text-[10px] font-black uppercase tracking-widest">
            <i class="fa fa-arrow-left mr-2"></i> Portal Principal
        </a>
        <img src="alv_sport_logo.png.jpeg" class="h-12 md:h-14 drop-shadow-lg" alt="ALV Sport">
    </header>

    <div class="max-w-4xl mx-auto px-6 mt-10">
        <div class="text-center mb-8 reveal" style="animation-delay: 0.2s">
            <h1 class="text-4xl font-black italic uppercase tracking-tighter mb-2">Calendario <span class="text-red-600">Pro</span></h1>
            <div class="inline-flex items-center gap-2 bg-white/5 border border-white/10 px-4 py-2 rounded-full">
                <i class="fa fa-mouse-pointer text-red-500 text-[10px]"></i>
                <p class="text-slate-300 text-[9px] font-black uppercase tracking-widest italic">Haz clic en un juego para ver detalles</p>
            </div>
        </div>

        <div class="flex justify-center gap-3 mb-10 reveal" style="animation-delay: 0.3s">
            <button onclick="cambiarFiltro('all')" class="filter-btn active px-5 py-2 rounded-xl text-[9px] font-black uppercase glass-card transition-all">Todos</button>
            <button onclick="cambiarFiltro('femenil')" class="filter-btn px-5 py-2 rounded-xl text-[9px] font-black uppercase glass-card transition-all text-pink-400">Femenil</button>
            <button onclick="cambiarFiltro('varonil')" class="filter-btn px-5 py-2 rounded-xl text-[9px] font-black uppercase glass-card transition-all text-blue-400">Varonil</button>
        </div>

        <section class="mb-12">
            <h2 class="text-blue-500 font-black italic uppercase tracking-widest text-[10px] mb-6 flex items-center gap-3">
                <span class="w-8 h-[1px] bg-blue-500/30"></span> Próximos Encuentros
            </h2>
            <div class="grid gap-3" id="containerPendientes"></div>
        </section>

        <section>
            <h2 class="text-slate-500 font-black italic uppercase tracking-widest text-[10px] mb-6 flex items-center gap-3">
                <span class="w-8 h-[1px] bg-slate-800"></span> Resultados Recientes
            </h2>
            <div class="grid gap-3" id="containerFinalizados"></div>
        </section>
    </div>

    <div id="modalDetails" class="fixed inset-0 flex items-center justify-center p-6 bg-black/90">
        <div class="glass-card w-full max-w-sm rounded-[2.5rem] p-8 border-red-600/30 relative modal-anim">
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-1 bg-red-600 rounded-b-full shadow-[0_0_15px_#dc2626]"></div>
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-500 hover:text-white"><i class="fa fa-times"></i></button>
            
            <div class="text-center">
                <img src="logoalvnegro.jpeg" class="h-16 mx-auto mb-4">
                <span id="mSub" class="text-[8px] font-black uppercase tracking-[0.4em] text-red-500"></span>
                <h3 id="mTeams" class="text-xl font-black italic uppercase text-white mt-1 leading-tight"></h3>
                
                <div id="mScoreBox" class="my-6 py-4 bg-white/5 rounded-3xl border border-white/5 overflow-hidden relative">
                    <div id="vsAnimContainer" class="h-24 flex items-center justify-center">
                        <dotlottie-player src="https://lottie.host/8e23974c-4738-4e89-8012-6f9872e448b1/mXv49z8nQu.json" 
                            background="transparent" speed="1" style="width: 150px; height: 150px;" loop autoplay>
                        </dotlottie-player>
                    </div>
                    <p id="mScore" class="text-5xl font-black tracking-tighter text-white hidden"></p>
                </div>

                <div class="space-y-4 text-left border-t border-white/5 pt-4">
                    <div class="flex items-center gap-3">
                        <i class="fa fa-calendar-day text-red-600 text-xs"></i>
                        <div>
                            <span class="block text-[7px] text-slate-500 uppercase font-bold">Fecha y Hora</span>
                            <p id="mInfo" class="text-[10px] font-black text-white uppercase"></p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <i class="fa fa-location-dot text-red-600 text-xs"></i>
                        <div>
                            <span class="block text-[7px] text-slate-500 uppercase font-bold">Campo</span>
                            <p class="text-[10px] font-black text-white uppercase tracking-tighter">Unidad Deportiva Ley 57</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <i class="fa fa-id-badge text-red-600 text-xs"></i>
                        <div>
                            <span class="block text-[7px] text-slate-500 uppercase font-bold">Ampayer Oficial</span>
                            <p id="mAmpayer" class="text-[10px] font-black text-white uppercase tracking-tighter"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://ley57.onrender.com/api";
        let juegosBase = [];
        let filtroLiga = 'all';

        document.addEventListener('DOMContentLoaded', async () => {
            await sincronizarJuegos();
        });

        async function sincronizarJuegos() {
            try {
                const res = await fetch(`${API}/games`);
                juegosBase = await res.json();
                renderizarJuegos();
            } catch (e) { console.error("Error sincronizando"); }
        }

        function cambiarFiltro(l) {
            filtroLiga = l;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderizarJuegos();
        }

        function renderizarJuegos() {
            const containerP = document.getElementById('containerPendientes');
            const containerF = document.getElementById('containerFinalizados');
            containerP.innerHTML = ''; containerF.innerHTML = '';

            let filtrados = juegosBase
                .filter(g => filtroLiga === 'all' || g.liga === filtroLiga)
                .sort((a, b) => new Date(b.fecha) - new Date(a.fecha));

            filtrados.forEach((j, index) => {
                const esFinal = j.status === 'finalizado';
                const esFem = j.liga === 'femenil';
                
                const borderColor = esFem ? 'border-pink-600/50' : 'border-blue-600/50';
                const hoverColor = esFem ? 'hover:border-pink-400' : 'hover:border-blue-400';
                const shadowColor = esFem ? 'hover:shadow-[0_0_15px_rgba(219,39,119,0.2)]' : 'hover:shadow-[0_0_15px_rgba(37,99,235,0.2)]';

                const card = `
                    <div class="glass-card p-5 rounded-[1.5rem] border-l-4 ${borderColor} ${hoverColor} ${shadowColor} flex items-center justify-between cursor-pointer transition-all reveal" 
                         style="animation-delay: ${0.05 * index}s"
                         onclick='openModal(${JSON.stringify(j)})'>
                        <div class="flex items-center gap-4">
                            <div class="text-center min-w-[40px] border-r border-white/5 pr-3">
                                <span class="block text-red-600 font-black text-lg italic leading-none">${extraerDia(j.fecha)}</span>
                                <span class="text-[7px] uppercase font-bold text-slate-500">${extraerMes(j.fecha)}</span>
                            </div>
                            <div>
                                <p class="text-xs md:text-sm font-black italic uppercase tracking-tighter">
                                    ${j.local} <span class="text-red-600 mx-1">${esFinal ? j.resultado : 'VS'}</span> ${j.visita}
                                </p>
                                <span class="text-[7px] font-black uppercase text-slate-500">${esFem ? 'Ley 57' : 'ALV Sport'}</span>
                            </div>
                        </div>
                        <i class="fa fa-chevron-right text-[8px] text-slate-700"></i>
                    </div>
                `;
                if (esFinal) containerF.innerHTML += card; else containerP.innerHTML += card;
            });
        }

        function extraerDia(f) { return f.includes('-') ? f.split('-')[2] : f.split('/')[0]; }
        function extraerMes(f) { 
            const meses = ["ENE", "FEB", "MAR", "ABR", "MAY", "JUN", "JUL", "AGO", "SEP", "OCT", "NOV", "DIC"];
            const mIdx = f.includes('-') ? parseInt(f.split('-')[1]) - 1 : parseInt(f.split('/')[1]) - 1;
            return meses[mIdx] || "MES";
        }

        function openModal(j) {
            const vsAnim = document.getElementById('vsAnimContainer');
            const scoreTxt = document.getElementById('mScore');
            
            document.getElementById('mSub').innerText = j.liga === 'femenil' ? 'LEY 57 · FEMENIL' : 'ALV SPORT · VARONIL';
            document.getElementById('mTeams').innerText = `${j.local} VS ${j.visita}`;
            
            if (j.status === 'finalizado') {
                if (vsAnim) vsAnim.style.display = 'none';
                scoreTxt.style.display = 'block';
                scoreTxt.innerText = j.resultado; 
            } else {
                if (vsAnim) vsAnim.style.display = 'flex';
                scoreTxt.style.display = 'none';
            }
            
            document.getElementById('mInfo').innerText = `${j.fecha} | ${j.hora} HRS`;
            document.getElementById('mAmpayer').innerText = (j.liga === 'femenil') ? "Javier Yocupicio" : "Javier Yocupicio / Staff ALV";
            
            const modal = document.getElementById('modalDetails');
            modal.style.display = 'flex';
        }

        function closeModal() { document.getElementById('modalDetails').style.display = 'none'; }
    </script>
</body>
</html>
