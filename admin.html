<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Master Admin - LEY 57</title>
    <link rel="icon" type="image/png" href="logoley57icon.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .input-inline { width: 45px; border: 1px solid #ddd; border-radius: 4px; text-align: center; font-weight: bold; background: #f9f9f9; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans flex min-h-screen">

    <aside class="w-64 bg-blue-900 text-white p-6 sticky top-0 h-screen shadow-2xl flex flex-col">
        <div class="flex flex-col gap-1 mb-10 italic border-b border-blue-800 pb-4">
            <div class="flex items-center gap-3">
                <img src="imgley57.pgn.png" class="w-10 h-10 bg-white rounded-full p-1">
                <h1 class="font-black text-xl italic uppercase leading-none">LEY 57 <span class="text-red-500 text-[10px] block font-sans">Admin Panel</span></h1>
            </div>
            
            <div class="mt-4 flex items-center gap-2 bg-blue-950/50 p-2 rounded-lg border border-blue-700/50">
                <i class="fa fa-user-circle text-red-500 text-sm"></i>
                <p class="text-[9px] font-black text-slate-300 uppercase tracking-widest leading-none">
                    Usuario: <span id="nombreUsuarioActivo" class="text-white">---</span>
                </p>
            </div>
        </div>

        <nav class="space-y-4 flex-1">
            <div class="p-3 bg-blue-800/50 rounded-xl border border-blue-700 mb-6 text-center">
                <p class="text-[9px] font-black text-blue-300 uppercase mb-2">Altas Managers</p>
                <input type="checkbox" id="masterSwitch" onchange="toggleAltas()" class="w-5 h-5 accent-red-600 cursor-pointer">
            </div>

            <button onclick="location.reload()" class="w-full text-left p-3 hover:bg-blue-800 rounded-xl transition flex items-center gap-3"><i class="fa fa-sync"></i> Sincronizar</button>
            <button onclick="toggleModal('modalEquipo')" class="w-full text-left p-3 bg-emerald-600 rounded-xl font-bold flex items-center gap-3"><i class="fa fa-plus-circle"></i> Nuevo Equipo</button>
            <button onclick="toggleModal('modalRosters')" class="w-full text-left p-3 bg-amber-500 rounded-xl font-bold flex items-center gap-3"><i class="fa fa-user-edit"></i> Roster / Stats</button>
            <button onclick="generarRolIA()" class="w-full text-left p-3 bg-purple-600 rounded-xl font-bold flex items-center gap-3"><i class="fa fa-robot"></i> Generar Rol IA</button>
            
            <hr class="opacity-20">
            <button onclick="limpiarHistorialSemanal()" class="w-full text-left p-3 bg-red-600 hover:bg-red-700 rounded-xl font-bold flex items-center gap-3 transition">
                <i class="fa fa-broom"></i> Limpiar Semana
            </button>
        </nav>

        <div class="mt-auto space-y-2">
            <button onclick="descargarHistorial()" class="w-full text-left p-3 bg-slate-700 hover:bg-slate-800 rounded-xl font-bold flex items-center gap-3 transition">
                <i class="fa fa-file-download"></i> Descargar Reporte
            </button>
            <button onclick="cerrarSesion()" class="w-full text-left p-2 text-red-400 font-bold uppercase text-[9px] mt-2 hover:text-white transition"><i class="fa fa-power-off mr-2"></i> Salir del Sistema</button>
        </div>
    </aside>

    <main class="flex-1 p-8 space-y-8 overflow-y-auto">
        <div class="grid grid-cols-1 gap-8">
            <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
                <div class="bg-blue-600 p-3 text-white font-bold text-xs uppercase tracking-widest italic">Categoría Intermedia</div>
                <table class="w-full text-xs text-center"><thead class="bg-slate-100 border-b font-black text-slate-500 uppercase"><tr class="bg-slate-100 border-b font-black text-slate-500 uppercase"><th class="p-4 text-left">Equipo</th><th>JJ</th><th>JG</th><th>JP</th><th>CA</th><th>CR</th><th class="text-blue-600">DIF</th><th>X</th></tr></thead><tbody id="tablaIntermedia" class="divide-y font-bold text-blue-900"></tbody></table>
            </div>

            <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
                <div class="bg-orange-500 p-3 text-white font-bold text-xs uppercase tracking-widest italic">Categoría Relax</div>
                <table class="w-full text-xs text-center"><thead class="bg-slate-100 border-b font-black text-slate-500 uppercase"><tr class="bg-slate-100 border-b font-black text-slate-500 uppercase"><th class="p-4 text-left">Equipo</th><th>JJ</th><th>JG</th><th>JP</th><th>CA</th><th>CR</th><th class="text-orange-600">DIF</th><th>X</th></tr></thead><tbody id="tablaRelax" class="divide-y font-bold text-blue-900"></tbody></table>
            </div>
        </div>

        <section class="bg-white p-6 rounded-3xl border shadow-sm">
            <h3 class="text-blue-900 font-black mb-6 uppercase text-xs italic tracking-widest border-b pb-2">Jornada Actual / Marcadores</h3>
            <div id="listaResultados" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8"></div>
            
            <div class="bg-slate-50 p-6 rounded-3xl border-2 border-dashed border-slate-200">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-4 text-center tracking-widest">Programación Manual</p>
                <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
                    <select id="selLoc" class="p-2 border rounded-xl text-xs font-bold bg-white"></select>
                    <select id="selVis" class="p-2 border rounded-xl text-xs font-bold bg-white"></select>
                    <input type="date" id="fec" class="p-2 border rounded-xl text-xs font-bold">
                    <input type="time" id="hor" class="p-2 border rounded-xl text-xs font-bold">
                    <button onclick="guardarJuego()" class="bg-blue-900 text-white p-2 rounded-xl font-black text-[10px] uppercase shadow-lg">Publicar</button>
                </div>
            </div>
        </section>

        <section class="bg-white p-6 rounded-3xl border border-red-100 shadow-sm">
            <h3 class="text-red-600 font-black mb-4 uppercase text-xs flex items-center gap-2 italic"><i class="fa fa-robot"></i> IA Scanner de Hojas (OCR)</h3>
            <div class="flex gap-4">
                <input type="file" id="imageInput" class="flex-1 text-xs border p-2 rounded-xl bg-slate-50">
                <button onclick="escanearHoja()" id="btnScan" class="bg-red-600 text-white px-6 rounded-xl font-bold text-xs uppercase shadow-lg">Analizar Hoja</button>
            </div>
            <textarea id="resultadoIA" class="w-full mt-4 p-3 bg-amber-50 border rounded-xl text-[10px] h-24 font-mono" placeholder="Esperando análisis..."></textarea>
        </section>
    </main>

    <div id="modalRosters" class="modal">
        <div class="bg-white p-6 rounded-3xl w-full max-w-5xl max-h-[85vh] flex flex-col shadow-2xl border-t-8 border-amber-500">
            <div class="flex justify-between items-center mb-6">
                <div><h2 class="font-black text-amber-600 italic uppercase leading-none text-xl">Editor de Roster</h2><p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">Gestión Maestra de Jugadoras</p></div>
                <select id="filterRoster" onchange="verRosterEquipo()" class="p-3 border rounded-xl font-bold text-xs bg-slate-50 outline-none focus:ring-2 focus:ring-amber-500"></select>
            </div>
            <div id="containerRoster" class="flex-1 overflow-y-auto space-y-4 custom-scroll pr-2"></div>
            <button onclick="toggleModal('modalRosters')" class="mt-6 bg-slate-800 text-white p-4 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-black transition-all">Cerrar Editor</button>
        </div>
    </div>

    <div id="modalEquipo" class="modal">
        <div class="bg-white p-8 rounded-3xl w-80 shadow-2xl border-t-8 border-emerald-600">
            <h2 class="font-black mb-4 text-center italic uppercase">Nuevo Equipo</h2>
            <input type="text" id="teamName" placeholder="NOMBRE" class="w-full p-3 border rounded-xl mb-4 font-bold outline-none uppercase bg-slate-50">
            <select id="teamCat" class="w-full p-3 border rounded-xl mb-6 font-bold text-xs uppercase bg-slate-50"><option value="Intermedia">Intermedia</option><option value="Relax">Relax</option></select>
            <div class="flex gap-2">
                <button onclick="toggleModal('modalEquipo')" class="flex-1 bg-slate-200 p-3 rounded-xl font-bold text-xs uppercase">Cerrar</button>
                <button onclick="guardarEquipo()" class="flex-1 bg-emerald-600 text-white p-3 rounded-xl font-bold text-xs uppercase">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        const API = "https://ley57.onrender.com/api";

        // --- SESIÓN Y USUARIO (LO QUE ARREGLAMOS) ---
        function gestionarSesion() {
            const sesion = localStorage.getItem('userLogueado');
            if (sesion) {
                const user = JSON.parse(sesion);
                // Extrae nombre antes del @
                const nombreSimple = user.correo.split('@')[0].toUpperCase();
                document.getElementById('nombreUsuarioActivo').innerText = nombreSimple;
            } else {
                window.location.href = 'index.html';
            }
        }

        function cerrarSesion() { 
            if(confirm("¿Cerrar sesión de administrador?")) {
                localStorage.clear(); 
                window.location.href = 'index.html'; 
            }
        }

        // --- FUNCIONES CORE ---
        function toggleModal(id) { document.getElementById(id).classList.toggle('active'); }

        async function cargarTodo() {
            cargarConfig();
            cargarEquipos();
            cargarResultados();
            gestionarSesion();
        }

        async function cargarConfig() {
            const res = await fetch(`${API}/config`);
            const conf = await res.json();
            document.getElementById('masterSwitch').checked = conf.permitirAltas;
        }

        async function toggleAltas() {
            const val = document.getElementById('masterSwitch').checked;
            await fetch(`${API}/config`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ permitirAltas: val }) });
        }

        async function cargarEquipos() {
    const res = await fetch(`${API}/equipos`);
    const equipos = await res.json();
    const tInt = document.getElementById('tablaIntermedia');
    const tRel = document.getElementById('tablaRelax');
    const selects = [document.getElementById('selLoc'), document.getElementById('selVis'), document.getElementById('filterRoster')];
    
    tInt.innerHTML = ""; tRel.innerHTML = "";
    selects.forEach(s => s.innerHTML = '<option value="">-- EQUIPO --</option>');

    // Ordenamos por Ganados
    equipos.sort((a,b) => b.g - a.g).forEach(e => {
        const jj = (e.g || 0) + (e.p || 0); // CÁLCULO AUTOMÁTICO DE JJ
        const dif = (e.ca || 0) - (e.ce || 0);
        
        const fila = `
            <tr class="hover:bg-slate-50 border-b">
                <td class="p-4 text-left uppercase italic font-black text-blue-900">${e.nombre}</td>
                <td class="font-bold text-slate-500 bg-slate-50/50">${jj}</td>
                
                <td><input type="number" onchange="updEq('${e._id}','g',this.value)" value="${e.g}" class="input-inline text-emerald-600"></td>
                <td><input type="number" onchange="updEq('${e._id}','p',this.value)" value="${e.p}" class="input-inline text-red-500"></td>
                <td><input type="number" onchange="updEq('${e._id}','ca',this.value)" value="${e.ca}" class="input-inline"></td>
                <td><input type="number" onchange="updEq('${e._id}','ce',this.value)" value="${e.ce}" class="input-inline"></td>
                <td class="font-black ${dif>=0?'text-blue-600':'text-orange-500'}">${dif>0?'+'+dif:dif}</td>
                <td><button onclick="eliminarEquipo('${e._id}')" class="text-slate-300 hover:text-red-500"><i class="fa fa-trash"></i></button></td>
            </tr>`;
            
        if(e.categoria === "Intermedia") tInt.innerHTML += fila; else tRel.innerHTML += fila;
        selects.forEach(s => s.innerHTML += `<option value="${e.nombre}">${e.nombre}</option>`);
    });
}
       /* async function cargarEquipos() {

        async function updEq(id, campo, val) {
            let d = {}; d[campo] = Number(val);
            await fetch(`${API}/equipos/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d) });
            cargarEquipos();
        }

        async function cargarResultados() {
            const res = await fetch(`${API}/games`);
            const games = await res.json();
            const cont = document.getElementById('listaResultados');
            cont.innerHTML = "";
            games.filter(g => g.status === 'pendiente').forEach(g => {
                cont.innerHTML += `<div class="bg-white p-4 rounded-3xl border shadow-sm relative"><button onclick="eliminarJuego('${g._id}')" class="absolute -top-2 -right-2 bg-red-600 text-white w-7 h-7 rounded-full text-[10px] shadow-xl hover:bg-black transition z-10"><i class="fa fa-times"></i></button><div class="flex justify-between text-[10px] font-black text-slate-400 uppercase"><span>${g.fecha}</span><span>${g.hora}</span></div><div class="flex justify-between items-center py-3"><span class="text-[10px] font-black uppercase flex-1 truncate">${g.local}</span><div class="flex gap-1 mx-2"><input id="sc-${g._id}-L" type="number" class="w-9 p-1 border rounded text-center font-bold" placeholder="L"><input id="sc-${g._id}-V" type="number" class="w-9 p-1 border rounded text-center font-bold" placeholder="V"></div><span class="text-[10px] font-black uppercase flex-1 text-right truncate">${g.visita}</span></div><button onclick="finalizarJuego('${g._id}','${g.local}','${g.visita}')" class="w-full bg-blue-600 text-white text-[9px] font-black py-2 rounded-xl uppercase italic">Finalizar Juego</button></div>`;
            });
        }

        async function guardarJuego() {
            const local = document.getElementById('selLoc').value, visita = document.getElementById('selVis').value, fecha = document.getElementById('fec').value, hora = document.getElementById('hor').value;
            if(!local || !visita || !fecha || !hora) return alert("Completa los datos");
            await fetch(`${API}/games`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ local, visita, fecha, hora, status: "pendiente" }) });
            cargarResultados();
        }

        async function finalizarJuego(id, loc, vis) {
            const sL = parseInt(document.getElementById(`sc-${id}-L`).value), sV = parseInt(document.getElementById(`sc-${id}-V`).value);
            if(isNaN(sL) || isNaN(sV)) return alert("Pon el marcador");
            await fetch(`${API}/games/resultado`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id, sL, sV, ganador: sL > sV ? loc : vis, perdedor: sL > sV ? vis : loc, loc, vis }) });
            cargarEquipos(); cargarResultados();
        }

        async function verRosterEquipo() {
            const eq = document.getElementById('filterRoster').value, cont = document.getElementById('containerRoster');
            if(!eq) return;
            cont.innerHTML = "<p class='text-center py-10 animate-pulse'>Cargando...</p>";
            const res = await fetch(`${API}/players?equipo=${encodeURIComponent(eq)}`);
            const players = await res.json();
            cont.innerHTML = players.map(p => `<div class="p-4 bg-slate-50 rounded-2xl border flex flex-col gap-3"><div class="grid grid-cols-2 gap-4"><div><label class="text-[8px] font-black uppercase text-slate-400">Nombre</label><input type="text" onchange="updPlFull('${p._id}','nombre',this.value)" value="${p.nombre}" class="w-full p-2 border rounded-lg font-bold text-xs uppercase"></div><div><label class="text-[8px] font-black uppercase text-slate-400">Fecha Nac.</label><input type="text" onchange="updPlFull('${p._id}','fechaNacimiento',this.value)" value="${p.fechaNacimiento}" class="w-full p-2 border rounded-lg font-bold text-xs"></div></div><div class="flex items-center gap-4 bg-white p-2 rounded-lg border-dashed border"><span>JJ <input type="number" onchange="updPlFull('${p._id}','jj',this.value)" value="${p.jj||0}" class="input-inline"></span><span>AB <input type="number" onchange="updPlFull('${p._id}','vb',this.value)" value="${p.vb||0}" class="input-inline"></span><span>H <input type="number" onchange="updPlFull('${p._id}','h',this.value)" value="${p.h||0}" class="input-inline"></span><span>HR <input type="number" onchange="updPlFull('${p._id}','hr',this.value)" value="${p.hr||0}" class="input-inline"></span><button onclick="eliminarJugadora('${p._id}')" class="ml-auto text-red-400"><i class="fa fa-trash-alt"></i></button></div></div>`).join('');
        }

        async function updPlFull(id, campo, val) {
            let d = {}; d[campo] = (campo === 'nombre' || campo === 'fechaNacimiento') ? val : Number(val);
            await fetch(`${API}/players/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d) });
        }

        async function eliminarJugadora(id) { if(confirm("¿Borrar?")) { await fetch(`${API}/players/${id}`, { method: 'DELETE' }); verRosterEquipo(); } }
        async function eliminarEquipo(id) { if(confirm("¿Borrar equipo?")) { await fetch(`${API}/equipos/${id}`, { method: 'DELETE' }); cargarEquipos(); } }
        async function eliminarJuego(id) { if(confirm("¿Borrar juego?")) { await fetch(`${API}/games/${id}`, { method: 'DELETE' }); cargarResultados(); } }
        async function guardarEquipo() { const n = document.getElementById('teamName').value, c = document.getElementById('teamCat').value; if(!n) return; await fetch(`${API}/equipos`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ nombre: n.toUpperCase(), categoria: c }) }); toggleModal('modalEquipo'); cargarEquipos(); }
        function descargarHistorial() { window.location.href = `${API}/games/download`; }
        async function limpiarHistorialSemanal() { if(confirm("¿Limpiar todo el historial de juegos finalizados?")) { await fetch(`${API}/games/clear/history`, { method: 'DELETE' }); cargarResultados(); } }
        async function escanearHoja() { const img = document.getElementById('imageInput').files[0]; if(!img) return alert("Sube foto"); Tesseract.recognize(img, 'spa').then(({ data: { text } }) => { document.getElementById('resultadoIA').value = text; }); }

        async function generarRolIA() {
            const res = await fetch(`${API}/equipos`);
            const equipos = await res.json();
            const intermedia = equipos.filter(e => e.categoria === "Intermedia"), relax = equipos.filter(e => e.categoria === "Relax");
            const emparejar = async (lista) => {
                const shuffled = lista.sort(() => 0.5 - Math.random());
                for (let i = 0; i < shuffled.length; i += 2) {
                    if (shuffled[i] && shuffled[i+1]) {
                        await fetch(`${API}/games`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ local: shuffled[i].nombre, visita: shuffled[i+1].nombre, fecha: "2026-04-12", hora: "19:00", status: "pendiente" }) });
                    }
                }
            };
            await emparejar(intermedia); await emparejar(relax);
            alert("Rol generado"); cargarResultados();
        }

        // --- INICIALIZACIÓN ---
        document.addEventListener('DOMContentLoaded', cargarTodo);
    </script>
</body>
</html>
