<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard - Liga Ley 57</title>
    <link rel="icon" type="image/png" href="logoley57icon.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar-link:hover { background-color: #1e3a8a; border-left: 4px solid #ef4444; }
        .hidden { display: none; }
        .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Transición suave para el sidebar */
        #sidebar { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans flex min-h-screen relative overflow-x-hidden">

    <div id="sidebarOverlay" onclick="toggleMobileMenu()" class="fixed inset-0 bg-black/60 z-40 hidden"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-blue-900 text-white p-6 transform -translate-x-full md:translate-x-0 md:relative md:flex shadow-2xl flex-col h-screen">
        <div class="flex items-center gap-3 mb-10">
            <img src="imgley57.pgn.png" class="w-12 h-12 bg-white rounded-full p-1 border-2 border-red-500">
            <div>
                <h1 class="font-black text-xl italic leading-none">LEY 57</h1>
                <span class="text-[9px] text-blue-300 tracking-widest uppercase">Manager Panel</span>
            </div>
        </div>
        
        <nav class="space-y-4 flex-1">
            <p class="text-[9px] font-black text-blue-400 uppercase tracking-widest ml-2">Menú Principal</p>
            <a href="#" onclick="if(window.innerWidth<768) toggleMobileMenu()" class="sidebar-link block p-3 rounded-xl transition flex items-center gap-3 bg-blue-800 border-l-4 border-red-500">
                <i class="fa fa-user-tie"></i> Mi Equipo
            </a>
            <a href="estadisticas.html" target="_blank" class="sidebar-link block p-3 rounded-xl transition flex items-center gap-3">
                <i class="fa fa-chart-line"></i> Estadísticas
            </a>
            
            <p class="text-[9px] font-black text-blue-400 uppercase tracking-widest ml-2 mt-8">Configuración</p>
            <button onclick="toggleModalPassword()" class="w-full text-left sidebar-link block p-3 rounded-xl transition flex items-center gap-3">
                <i class="fa fa-key"></i> Cambiar Contraseña
            </button>
        </nav>

        <div class="mt-auto">
            <hr class="opacity-20 mb-6">
            <button onclick="cerrarSesion()" class="w-full text-left sidebar-link block p-3 rounded-xl transition flex items-center gap-3 text-red-400 font-bold">
                <i class="fa fa-power-off"></i> CERRAR SESIÓN
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col w-full min-w-0">
        <header class="bg-white p-4 md:p-6 shadow-sm flex justify-between items-center border-b sticky top-0 z-30">
            <div class="flex items-center gap-3">
                <button onclick="toggleMobileMenu()" class="md:hidden text-blue-900 text-2xl p-2">
                    <i class="fa fa-bars"></i>
                </button>
                <div>
                    <h2 id="nombreEquipoCabecera" class="font-black text-lg md:text-2xl text-blue-900 uppercase tracking-tighter italic text-red-600 truncate max-w-[160px] md:max-w-none">CARGANDO...</h2>
                    <p class="text-[8px] md:text-[10px] text-slate-400 font-bold uppercase tracking-widest">Panel de Control</p>
                </div>
            </div>
            <div id="statusBadge" class="text-[8px] md:text-[9px] font-black px-2 md:px-3 py-1 rounded-full shadow-sm bg-slate-100 uppercase italic">...</div>
        </header>

        <div class="p-4 md:p-8 space-y-6 md:space-y-8 w-full">
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-8">
                <section class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="bg-blue-600 p-4 text-white flex justify-between items-center italic">
                        <h3 class="font-bold uppercase text-[10px] md:text-xs tracking-widest"><i class="fa fa-copy mr-2"></i> Alta Masiva</h3>
                    </div>
                    <div id="formMasivo" class="p-4 md:p-6 space-y-4">
                        <textarea id="rawRoster" class="w-full h-32 p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm outline-none font-mono" placeholder="Pega tu lista aquí..."></textarea>
                        <button onclick="procesarRoster()" class="w-full bg-blue-900 text-white font-black py-3 rounded-xl hover:bg-red-600 transition text-[10px] uppercase tracking-widest italic">Guardar Lista</button>
                    </div>
                </section>

                <section class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="bg-emerald-600 p-4 text-white flex justify-between items-center italic">
                        <h3 class="font-bold uppercase text-[10px] md:text-xs tracking-widest"><i class="fa fa-user-plus mr-2"></i> Alta Individual</h3>
                    </div>
                    <div id="formIndividual" class="p-4 md:p-6 space-y-3">
                        <input type="text" id="soloNombre" placeholder="Nombre de la Jugadora" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none font-bold uppercase">
                        <div class="flex gap-2">
                            <input type="text" id="soloFecha" placeholder="DD/MM/AAAA" class="flex-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm">
                            <select id="soloCat" class="flex-1 p-3 bg-white border border-slate-200 rounded-xl text-sm font-bold uppercase italic">
                                <option value="bateo">Jugadora</option>
                            </select>
                        </div>
                        <button onclick="guardarIndividual()" class="w-full bg-emerald-600 text-white font-black py-3 rounded-xl hover:bg-emerald-700 transition text-[10px] uppercase tracking-widest italic">Registrar</button>
                    </div>
                </section>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-8">
                <div class="bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col h-[400px] md:h-[500px]">
                    <h3 class="text-blue-900 font-black mb-4 flex items-center justify-between uppercase text-[10px] tracking-widest border-b pb-4 italic">
                        <span><i class="fa fa-users mr-2"></i> Mi Roster</span>
                        <span id="contadorRoster" class="bg-slate-100 text-slate-600 px-3 py-1 rounded-full text-[10px]">0</span>
                    </h3>
                    <div id="miRosterLista" class="flex-1 overflow-y-auto pr-2 space-y-2 custom-scroll"></div>
                </div>

                <div class="bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col h-auto md:h-[500px]">
                    <h3 class="text-orange-500 font-black mb-4 flex items-center gap-2 uppercase text-[10px] tracking-widest border-b pb-4 italic">
                        <i class="fa fa-calendar-check"></i> Próximo Juego
                    </h3>
                    <div id="proximoJuego" class="flex-1 flex items-center justify-center p-4"></div>
                </div>

                <div class="bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col h-[400px] md:h-[500px]">
                    <h3 class="text-red-600 font-black mb-4 flex items-center gap-2 uppercase text-[10px] tracking-widest border-b pb-4 italic">
                        <i class="fa fa-history"></i> Historial
                    </h3>
                    <div id="resultadosJornada" class="flex-1 overflow-y-auto space-y-4 custom-scroll pr-2"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API = "https://ley57.onrender.com/api";
        let equipoSeleccionado = "";
        let correoUsuario = "";

        // FUNCIÓN CLAVE PARA MÓVIL
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        function revisarSesion() {
            const sesion = localStorage.getItem('userLogueado');
            if (!sesion) { window.location.href = 'index.html'; return; }
            const user = JSON.parse(sesion);
            equipoSeleccionado = user.equipo;
            correoUsuario = user.correo;
            document.getElementById('nombreEquipoCabecera').innerText = equipoSeleccionado;
            iniciarSincronizacionRealTime();
        }

        // --- TODAS TUS FUNCIONES DE CARGA Y GUARDADO SE QUEDAN IGUAL ---
        function iniciarSincronizacionRealTime() {
            cargarMiRoster(); cargarResultados(); cargarProximoJuego(); verificarPermisos();
            setInterval(() => { if (equipoSeleccionado) { cargarResultados(); cargarProximoJuego(); verificarPermisos(); } }, 5000); 
        }

        async function cargarMiRoster() {
            try {
                const res = await fetch(`${API}/players?equipo=${encodeURIComponent(equipoSeleccionado)}`);
                const data = await res.json();
                const cont = document.getElementById('miRosterLista');
                document.getElementById('contadorRoster').innerText = data.length;
                cont.innerHTML = data.length ? "" : "<p class='text-center py-10 text-slate-300 italic'>Roster vacío.</p>";
                data.forEach(p => {
                    cont.innerHTML += `
                        <div class="flex justify-between items-center p-3 bg-slate-50 border rounded-xl border-slate-100">
                            <div class="flex flex-col">
                                <span class="text-[10px] font-black uppercase text-blue-900 italic">${p.nombre}</span>
                                <span class="text-[8px] text-slate-400 font-bold uppercase tracking-widest">Jugadora</span>
                            </div>
                            <span class="text-[9px] text-slate-500 font-mono bg-white px-2 py-1 rounded border border-slate-100 italic">
                                ${p.fechaNacimiento}
                            </span>
                        </div>`;
                });
            } catch (error) { console.error(error); }
        }

        async function cargarProximoJuego() {
            const cont = document.getElementById('proximoJuego');
            try {
                const res = await fetch(`${API}/games`);
                const games = await res.json();
                const miEq = equipoSeleccionado.trim().toUpperCase();
                const miJuego = games.find(g => g.status === 'pendiente' && (g.local.trim().toUpperCase() === miEq || g.visita.trim().toUpperCase() === miEq));
                if(!miJuego) {
                    cont.innerHTML = `<p class="text-[10px] text-slate-300 uppercase font-bold italic">Sin juegos</p>`;
                    return;
                }
                cont.innerHTML = `<div class="w-full text-center space-y-3">
                    <span class="text-[9px] bg-orange-100 text-orange-600 px-3 py-1 rounded-full font-black uppercase italic">${miJuego.fecha}</span>
                    <div class="flex justify-between items-center bg-white p-3 rounded-2xl border border-slate-100">
                        <span class="text-[10px] font-black uppercase flex-1">${miJuego.local}</span>
                        <span class="mx-2 text-blue-900 font-black">VS</span>
                        <span class="text-[10px] font-black uppercase flex-1">${miJuego.visita}</span>
                    </div>
                </div>`;
            } catch (e) { console.error(e); }
        }

        async function cargarResultados() {
            const res = await fetch(`${API}/games`);
            const games = await res.json();
            const cont = document.getElementById('resultadosJornada');
            cont.innerHTML = "";
            games.filter(g => g.status === 'finalizado').reverse().slice(0,5).forEach(g => {
                cont.innerHTML += `<div class="bg-white p-2 rounded-xl border border-slate-100 flex justify-between items-center gap-2">
                    <span class="text-[9px] font-black uppercase flex-1 truncate">${g.local}</span>
                    <span class="bg-red-600 text-white px-2 py-0.5 rounded font-bold text-[10px] italic">${g.resultado}</span>
                    <span class="text-[9px] font-black uppercase flex-1 text-right truncate">${g.visita}</span>
                </div>`;
            });
        }

        async function verificarPermisos() {
            const res = await fetch(`${API}/config`);
            const config = await res.json();
            const badge = document.getElementById('statusBadge');
            badge.innerText = config.permitirAltas ? "REGISTRO ABIERTO" : "CERRADO";
            badge.className = config.permitirAltas ? "text-[8px] font-black px-3 py-1 rounded-full bg-emerald-100 text-emerald-600" : "text-[8px] font-black px-3 py-1 rounded-full bg-red-100 text-red-600";
            
            const forms = [document.getElementById('formMasivo'), document.getElementById('formIndividual')];
            forms.forEach(f => f.parentElement.style.display = config.permitirAltas ? 'block' : 'none');
        }

        async function procesarRoster() {
            const rawText = document.getElementById('rawRoster').value;
            if(!rawText.trim() || !confirm("¿Guardar este roster?")) return;
            const lineas = rawText.split('\n');
            for(let linea of lineas) {
                if(linea.trim() === "") continue;
                const regexFecha = /(\d{2}\/\d{2}\/\d{4})/;
                const matchFecha = linea.match(regexFecha);
                const fechaDetectada = matchFecha ? matchFecha[0] : "Sin Fecha";
                let nombreLimpio = linea.replace(/^\d+[\.\s-]*/g, '').replace(fechaDetectada, '').replace(/[–\-\|]/g, '').trim();                
                if(nombreLimpio.length > 2) {
                    await fetch(`${API}/players`, {
                        method: 'POST',
                        headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({ nombre: nombreLimpio.toUpperCase(), equipo: equipoSeleccionado, fechaNacimiento: fechaDetectada, categoria: "bateo" })
                    });
                }
            }
            alert("Roster guardado.");
            document.getElementById('rawRoster').value = "";
            cargarMiRoster();
        }

        async function guardarIndividual() {
            const nombre = document.getElementById('soloNombre').value;
            const fecha = document.getElementById('soloFecha').value;
            if(!nombre || !fecha) return alert("Faltan datos.");
            await fetch(`${API}/players`, {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ nombre: nombre.toUpperCase(), equipo: equipoSeleccionado, fechaNacimiento: fecha, categoria: "bateo" })
            });
            alert("Registrada.");
            document.getElementById('soloNombre').value = ""; document.getElementById('soloFecha').value = "";
            cargarMiRoster();
        }

        function cerrarSesion() { localStorage.clear(); window.location.href = 'index.html'; }
        revisarSesion();
    </script>
</body>
</html>
