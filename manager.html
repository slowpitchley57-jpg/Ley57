<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrativo - Multiliga Pro</title>
    <link rel="icon" type="image/png" href="logoley57icon.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Oswald:wght@700&display=swap');

        body { font-family: 'Inter', sans-serif; }
        .font-oswald { font-family: 'Oswald', sans-serif; }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bg-luxury {
            background: linear-gradient(-45deg, #020617, #0f172a, #1e1b4b, #310606);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        .glass-login {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .active-role { 
            background: #ef4444 !important; 
            color: white !important; 
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); 
            transform: translateY(-2px);
        }

        .input-premium {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .input-premium:focus {
            border-color: #ef4444;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.15);
        }

        .floating-icon {
            position: absolute;
            pointer-events: none;
            color: rgba(255, 255, 255, 0.03);
            z-index: 1;
        }
    </style>
</head>
<body class="bg-luxury min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Iconos Flotantes de Fondo -->
    <div id="animation-container" class="absolute inset-0 z-0"></div>

    <main class="relative z-10 w-full max-w-[420px] animate-fade-in">
        <div class="glass-login rounded-[3rem] p-8 md:p-12 border-t-8 border-red-600">
            
            <!-- Branding -->
            <div class="flex flex-col items-center mb-10">
                <div class="relative group mb-6">
                    <div class="absolute inset-0 bg-red-600 blur-2xl opacity-20 group-hover:opacity-40 transition-opacity"></div>
                    <img src="logoalvnegro.jpeg" alt="ALV Sport" class="relative h-20 w-auto rounded-2xl shadow-2xl border border-white/10 transform transition-transform group-hover:scale-105">
                </div>
                <h1 class="font-oswald text-3xl text-white uppercase italic tracking-tighter leading-none">Panel de <span class="text-red-600">Control</span></h1>
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-[0.4em] mt-3">Sistemas Deportivos FV Digital</p>
            </div>

            <!-- Selector de Rol Mejorado -->
            <div class="flex bg-black/40 p-1.5 rounded-2xl mb-8 border border-white/5">
                <button onclick="setRole('manager')" id="btn-manager" class="flex-1 py-3 text-[10px] font-black rounded-xl transition-all duration-300 active-role uppercase tracking-widest italic">
                    <i class="fa fa-user-tie mr-2"></i>Manager
                </button>
                <button onclick="setRole('admin')" id="btn-admin" class="flex-1 py-3 text-[10px] font-black rounded-xl transition-all duration-300 text-slate-500 uppercase tracking-widest italic">
                    <i class="fa fa-shield-halved mr-2"></i>Admin
                </button>
            </div>

            <!-- Campos de Entrada -->
            <div id="login-fields" class="space-y-4 mb-8">
                <div class="relative">
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">
                        <i class="fa fa-envelope text-xs"></i>
                    </div>
                    <input type="text" id="u" placeholder="USUARIO / CORREO" class="input-premium w-full p-4 pl-12 rounded-2xl text-white font-bold text-xs outline-none placeholder:text-slate-600 uppercase tracking-tighter">
                </div>
                <div class="relative">
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">
                        <i class="fa fa-lock text-xs"></i>
                    </div>
                    <input type="password" id="p" placeholder="CONTRASEÑA" class="input-premium w-full p-4 pl-12 rounded-2xl text-white font-bold text-xs outline-none placeholder:text-slate-600 uppercase tracking-tighter">
                </div>
            </div>
            
            <!-- Botón Entrar -->
            <button onclick="entrar()" class="w-full bg-red-600 hover:bg-white hover:text-red-600 text-white font-black py-5 rounded-2xl transition-all duration-500 shadow-xl shadow-red-900/20 uppercase tracking-[0.2em] text-xs italic flex items-center justify-center gap-3 group">
                Iniciar Sesión <i class="fa fa-arrow-right group-hover:translate-x-1 transition-transform"></i>
            </button>

            <!-- Soporte / WhatsApp -->
            <div class="mt-10 flex flex-col items-center">
                <p class="text-[8px] font-bold text-slate-600 uppercase tracking-widest mb-4 italic">Desarrollado por</p>
                <a href="https://wa.me/526625374491" target="_blank" class="hover:scale-110 transition-transform duration-500">
                    <img src="fv_digital_logo.png.webp" class="h-16 opacity-70 hover:opacity-100 transition-opacity" alt="FV Digital">
                </a>
            </div>
        </div>
    </main>

    <script>
        const API = "https://ley57.onrender.com/api";
        let selectedRole = 'manager';

        function setRole(role) {
            selectedRole = role;
            ['manager', 'admin'].forEach(r => {
                const btn = document.getElementById(`btn-${r}`);
                btn.classList.remove('active-role');
                btn.classList.add('text-slate-500');
            });
            document.getElementById(`btn-${role}`).classList.add('active-role');
            document.getElementById(`btn-${role}`).classList.remove('text-slate-500');
        }

        async function entrar() {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            if(!u || !p) return alert("Por favor, ingresa tus datos.");

            try {
                const res = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ correo: u, pass: p })
                });

                if(res.ok) {
                    const user = await res.json();
                    if (user.rol === 'admin') {
                        localStorage.setItem('userLogueado', JSON.stringify(user));
                        window.location.href = 'admin.html';
                    } else {
                        localStorage.setItem('managerLogueado', JSON.stringify(user));
                        window.location.href = 'manager.html'; 
                    }
                } else {
                    alert("Acceso Denegado: Revisa tu correo o contraseña.");
                }
            } catch (error) {
                alert("Error de red: Verifica tu conexión.");
            }
        }

        // Sistema de partículas de fondo mejorado
        const container = document.getElementById('animation-container');
        const icons = ['fa-baseball-ball', 'fa-trophy', 'fa-star'];
        function createItem() {
            const item = document.createElement('i');
            item.className = `fa ${icons[Math.floor(Math.random()*icons.length)]} floating-icon`;
            const size = Math.random() * 40 + 20;
            item.style.fontSize = `${size}px`;
            let x = Math.random() * window.innerWidth, y = Math.random() * window.innerHeight;
            let sx = (Math.random()-0.5)*0.8, sy = (Math.random()-0.5)*0.8;
            container.appendChild(item);
            function move() {
                x += sx; y += sy;
                if (x < -100 || x > window.innerWidth + 100) sx *= -1;
                if (y < -100 || y > window.innerHeight + 100) sy *= -1;
                item.style.transform = `translate(${x}px, ${y}px)`;
                requestAnimationFrame(move);
            }
            move();
        }
        for (let i = 0; i < 12; i++) { createItem(); }
    </script>
</body>
</html>
