<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard - Liga Ley 57</title>
    <link rel="icon" type="image/png" href="logoley57icon.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar-link:hover { background-color: #1e3a8a; border-left: 4px solid #ef4444; }
        .hidden { display: none; }
        .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        #sidebar { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans flex min-h-screen relative overflow-x-hidden">

    <div id="sidebarOverlay" onclick="toggleMobileMenu()" class="fixed inset-0 bg-black/60 z-40 hidden md:hidden"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-blue-900 text-white p-6 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out shadow-2xl flex flex-col h-screen">
        <div class="flex items-center gap-3 mb-10">
            <img src="imgley57.pgn.png" class="w-12 h-12 bg-white rounded-full p-1 border-2 border-red-500">
            <div>
                <h1 class="font-black text-xl italic leading-none uppercase">LEY 57</h1>
                <span class="text-[9px] text-blue-300 tracking-widest uppercase">Manager Panel</span>
            </div>
        </div>
        
        <nav class="space-y-4 flex-1">
            <p class="text-[9px] font-black text-blue-400 uppercase tracking-widest ml-2">Menú Principal</p>
            <a href="#" class="sidebar-link block p-3 rounded-xl transition flex items-center gap-3 bg-blue-800 border-l-4 border-red-500">
                <i class="fa fa-users"></i> Mi Roster / Stats
            </a>
            <a id="btnLinkEstadisticas" class="sidebar-link block p-3 rounded-xl transition flex items-center gap-3 text-slate-300">
                <i class="fa fa-chart-line"></i> Ver Tabla General
            </a>
            
            <p class="text-[9px] font-black text-blue-400 uppercase tracking-widest ml-2 mt-8">Seguridad</p>
            <button onclick="toggleModalPassword()" class="w-full text-left sidebar-link block p-3 rounded-xl transition flex items-center gap-3">
                <i class="fa fa-key"></i> Cambiar Contraseña
            </button>
        </nav>

        <div class="mt-auto">
            <hr class="opacity-20 mb-6">
            <button onclick="cerrarSesion()" class="w-full text-left sidebar-link block p-3 rounded-xl transition flex items-center gap-3 text-red-400 font-bold uppercase text-xs tracking-widest">
                <i class="fa fa-sign-out-alt"></i> Salir del Panel
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col w-full min-w-0">
        <header class="bg-white p-4 md:p-6 shadow-sm flex justify-between items-center border-b sticky top-0 z-30">
            <div class="flex items-center">
                <button onclick="toggleMobileMenu()" class="md:hidden text-blue-900 text-2xl mr-4 p-2">
                    <i class="fa fa-bars"></i>
                </button>
                <div>
                    <h2 id="nombreEquipoCabecera" class="font-black text-lg md:text-2xl text-blue-900 uppercase tracking-tighter italic text-red-600 truncate max-w-[150px] md:max-w-none">CARGANDO...</h2>
                    <p class="text-[8px] md:text-[10px] text-slate-400 font-bold uppercase tracking-widest">Estadísticas y Seguimiento de Roster</p>
                </div>
            </div>
            <div id="statusBadge" class="hidden md:block text-[9px] font-black px-4 py-2 rounded-full shadow-sm bg-blue-50 text-blue-600 border border-blue-100 uppercase italic">EQUIPO ACTIVO</div>
        </header>

        <div class="p-4 md:p-8 space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <h3 class="text-orange-500 font-black mb-4 flex items-center gap-2 uppercase text-[10px] tracking-widest border-b pb-4 italic">
                        <i class="fa fa-calendar-alt"></i> Próximo Encuentro
                    </h3>
                    <div id="proximoJuego" class="min-h-[100px] flex items-center justify-center"></div>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <h3 class="text-blue-900 font-black mb-4 flex items-center gap-2 uppercase text-[10px] tracking-widest border-b pb-4 italic">
                        <i class="fa fa-history"></i> Resultados de Liga
                    </h3>
                    <div id="resultadosJornada" class="space-y-3"></div>
                </div>
            </div>

            <section class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-blue-900 p-4 text-white flex justify-between items-center">
                    <h3 class="font-bold uppercase text-[10px] tracking-widest italic"><i class="fa fa-users mr-2 text-red-500"></i> Jugadoras Registradas</h3>
                    <div class="flex gap-4 items-center">
                        <input type="text" id="busquedaRoster" onkeyup="filtrarRoster()" placeholder="Buscar jugadora..." class="bg-blue-800 text-white text-[10px] px-4 py-1.5 rounded-full outline-none border border-blue-700 focus:border-red-500 transition">
                        <span id="contadorRoster" class="bg-red-600 text-white px-3 py-1 rounded-full text-[10px] font-bold">0</span>
                    </div>
                </div>
                
                <div class="overflow-x-auto overflow-y-auto max-h-[600px] custom-scroll">
                    <table class="w-full text-center border-collapse">
                        <thead class="bg-slate-100 sticky top-0 z-10 border-b">
                            <tr class="text-[9px] font-black text-slate-500 uppercase italic">
                                <th class="p-4 text-left">Jugadora</th>
                                <th>JJ</th><th>VB</th><th>H</th><th>2B</th><th>3B</th><th>HR</th><th>K</th><th>RBI</th>
                                <th class="text-red-600">AVG</th>
                            </tr>
                        </thead>
                        <tbody id="miRosterLista" class="divide-y font-bold text-[10px] uppercase">
                            </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <div id="modalPassword" class="modal-bg hidden">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm border-t-8 border-blue-900 mx-4">
            <h3 class="text-xl font-black text-blue-900 uppercase italic mb-6">Nueva Contraseña</h3>
            <input type="password" id="nuevaPass" placeholder="Nueva clave" class="w-full p-4 bg-slate-100 rounded-2xl mb-4 outline-none font-bold">
            <input type="password" id="confirmPass" placeholder="Confirmar" class="w-full p-4 bg-slate-100 rounded-2xl mb-6 outline-none font-bold">
            <div class="flex gap-2">
                <button onclick="toggleModalPassword()" class="flex-1 bg-slate-200 p-3 rounded-xl font-bold text-[10px] uppercase">Cancelar</button>
                <button onclick="actualizarPassword()" class="flex-1 bg-blue-900 text-white p-3 rounded-xl font-bold text-[10px] uppercase">Guardar</button>
            </div>
        </div>
    </div>

    <script>
    const API = "https://ley57.onrender.com/api";
    let equipoSeleccionado = "";
    let correoUsuario = "";
    let jugadoresEnMemoria = []; // Para el buscador rápido

    function revisarSesion() {
        const sesion = localStorage.getItem('userLogueado') || localStorage.getItem('managerLogueado');
        if (!sesion) { window.location.href = 'index.html'; return; }
        const datos = JSON.parse(sesion);
        equipoSeleccionado = datos.equipo;
        correoUsuario = datos.correo || datos.email || "";

        document.getElementById('nombreEquipoCabecera').innerText = equipoSeleccionado; 

        const btnStats = document.getElementById('btnLinkEstadisticas');
        if (btnStats) {
            btnStats.style.cursor = 'pointer';
            btnStats.onclick = (e) => {
                e.preventDefault();
                if(confirm("¿Deseas cerrar sesión para ir a las estadísticas generales?")) { cerrarSesion(); }
            };
        }
        iniciarSincronizacionRealTime();
    }

    function iniciarSincronizacionRealTime() {
        cargarMiRoster(); 
        cargarResultados(); 
        cargarProximoJuego(); 
        setInterval(() => { 
            if (equipoSeleccionado) { 
                cargarResultados(); 
                cargarProximoJuego(); 
            } 
        }, 15000); 
    }

    function renderizarRoster(lista) {
        const cont = document.getElementById('miRosterLista');
        document.getElementById('contadorRoster').innerText = lista.length;
        
        if(lista.length === 0) {
            cont.innerHTML = `<tr><td colspan="10" class="p-10 text-slate-400 italic text-center">No hay jugadoras registradas aún.</td></tr>`;
            return;
        }

        cont.innerHTML = lista.map(p => `
            <tr class="hover:bg-blue-50 border-b">
                <td class="p-4 text-left font-black text-blue-900 italic">
                    ${p.nombre}
                    <p class="text-[7px] text-slate-400 font-normal">Nacimiento: ${p.fechaNacimiento || 'S/D'}</p>
                </td>
                <td class="text-slate-400">${p.jj || 0}</td>
                <td class="bg-slate-50/50">${p.vb || 0}</td>
                <td class="text-blue-600">${p.h || 0}</td>
                <td>${p.dobles || 0}</td>
                <td>${p.triples || 0}</td>
                <td class="text-red-500">${p.hr || 0}</td>
                <td class="text-slate-300">${p.k || 0}</td>
                <td>${p.rbi || 0}</td>
                <td class="bg-red-50 text-red-600 font-black italic text-xs">${(p.avg || 0).toFixed(3)}</td>
            </tr>
        `).join('');
    }

    function filtrarRoster() {
        const busqueda = document.getElementById('busquedaRoster').value.toUpperCase();
        const filtrados = jugadoresEnMemoria.filter(p => p.nombre.toUpperCase().includes(busqueda));
        renderizarRoster(filtrados);
    }

    // --- FUNCIONES RESTANTES (CALENDARIO, RESULTADOS, etc.) ---

    async function cargarProximoJuego() {
        const cont = document.getElementById('proximoJuego');
        try {
            const res = await fetch(`${API}/games`);
            const games = await res.json();
            const miEq = equipoSeleccionado.trim().toUpperCase();
            const miJuego = games.find(g => g.status === 'pendiente' && (g.local.trim().toUpperCase() === miEq || g.visita.trim().toUpperCase() === miEq));
            
            if(!miJuego) {
                cont.innerHTML = `<p class="text-[9px] text-slate-300 uppercase font-black italic">No tienes juegos programados próximamente</p>`;
                return;
            }
            cont.innerHTML = `
                <div class="text-center space-y-4 w-full">
                    <div class="inline-block bg-orange-100 text-orange-600 px-4 py-1 rounded-full font-black text-[9px] uppercase italic border border-orange-200">${miJuego.fecha} @ ${miJuego.hora}</div>
                    <div class="flex justify-between items-center gap-4">
                        <span class="text-[10px] font-black uppercase flex-1 truncate text-blue-900">${miJuego.local}</span>
                        <div class="bg-slate-900 text-white px-3 py-1 rounded-lg text-xs italic font-black shadow-lg">VS</div>
                        <span class="text-[10px] font-black uppercase flex-1 truncate text-blue-900 text-right">${miJuego.visita}</span>
                    </div>
                </div>`;
        } catch (e) {}
    }
    // Reemplaza esta parte en tu manager.html
async function cargarMiRoster() {
    if (!equipoSeleccionado) return;
    try {
        // Obtenemos todos los jugadores del equipo (sin importar la liga)
        const res = await fetch(`${API}/players?equipo=${encodeURIComponent(equipoSeleccionado)}`);
        jugadoresEnMemoria = await res.json();
        
        // Identificamos la liga del equipo desde el primer jugador para filtrar calendarios
        if(jugadoresEnMemoria.length > 0) {
            const ligaActual = jugadoresEnMemoria[0].liga;
            cargarResultadosLiga(ligaActual);
            cargarProximoJuegoLiga(ligaActual);
        }
        
        renderizarRoster(jugadoresEnMemoria);
    } catch (error) { console.error("Error cargando roster:", error); }
}

async function cargarResultadosLiga(liga) {
    try {
        const res = await fetch(`${API}/games?liga=${liga}&status=finalizado`);
        const games = await res.json();
        const cont = document.getElementById('resultadosJornada');
        cont.innerHTML = games.reverse().slice(0,4).map(g => `
            <div class="flex justify-between items-center bg-slate-50 p-2 rounded-xl border border-slate-100">
                <span class="text-[8px] font-black uppercase flex-1 truncate italic text-slate-500">${g.local}</span>
                <span class="bg-blue-900 text-white px-2 py-0.5 rounded text-[10px] font-black italic shadow-sm">${g.resultado}</span>
                <span class="text-[8px] font-black uppercase flex-1 truncate text-right italic text-slate-500">${g.visita}</span>
            </div>`).join('');
    } catch(e) {}
}

    function toggleMobileMenu() {
        document.getElementById('sidebar').classList.toggle('-translate-x-full');
        document.getElementById('sidebarOverlay').classList.toggle('hidden');
    }

    function toggleModalPassword() { 
        document.getElementById('modalPassword').classList.toggle('hidden'); 
    }

    async function actualizarPassword() {
        const p1 = document.getElementById('nuevaPass').value;
        const p2 = document.getElementById('confirmPass').value;
        if(!p1 || p1 !== p2) return alert("Las contraseñas no coinciden.");
        try {
            const res = await fetch(`${API}/users/update-password`, { 
                method: 'PUT', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ correo: correoUsuario, nuevaPass: p1 }) 
            });
            if(res.ok) { alert("Contraseña actualizada."); toggleModalPassword(); }
        } catch(e) {}
    }

    function cerrarSesion() { localStorage.clear(); window.location.href = 'index.html'; }

    revisarSesion();
    </script>
</body>
</html>
