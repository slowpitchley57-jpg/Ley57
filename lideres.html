<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Líderes Oficiales - Multiliga Pro</title>
    <link rel="icon" type="image/png" href="logoley57icon.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
        .bg-gradient-lideres { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #7c3aed 100%); }
        .tab-active { background: #6366f1; color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); }
        .tab-inactive { background: rgba(255,255,255,0.05); color: #94a3b8; }
        .tab-inactive:hover { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans">

<nav class="bg-slate-900/80 backdrop-blur-md text-white p-4 shadow-lg sticky top-0 z-50 border-b-4 border-indigo-500">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <div class="flex items-center gap-3">
            <i class="fa fa-trophy text-yellow-400 text-2xl"></i>
            <span class="font-black italic tracking-tighter text-xl uppercase">Líderes <span class="text-indigo-400">Multiliga</span></span>
        </div>
        <a href="index_post.html" class="text-[10px] bg-indigo-600 px-5 py-2 rounded-full font-black hover:bg-white hover:text-indigo-600 transition-all uppercase tracking-widest shadow-lg">Regresar</a>
    </div>
</nav>

<header class="bg-gradient-lideres text-white py-12 px-6 text-center shadow-inner relative overflow-hidden">
    <div class="absolute inset-0 opacity-10 pointer-events-none">
        <i class="fa fa-baseball-bat-ball text-9xl absolute -left-10 -bottom-10 rotate-12 text-indigo-200"></i>
        <i class="fa fa-crown text-9xl absolute -right-10 -top-10 -rotate-12 text-yellow-200"></i>
    </div>
    <h1 class="text-4xl font-black mb-1 italic uppercase tracking-tighter drop-shadow-lg">Centro de Estadísticas Individuales</h1>
    <p class="text-indigo-200 text-[10px] uppercase tracking-[0.5em] font-bold">Sincronizado con Panel Admin · 2026</p>
</header>

<main class="max-w-7xl mx-auto p-4 md:p-8 space-y-6">

    <!-- FILTROS DE LIGA -->
    <div class="flex flex-wrap gap-2 justify-center">
        <button onclick="cambiarLiga('todas')" id="ligaBtn_todas" class="liga-btn px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition-all tab-active">Todas las Ligas</button>
        <button onclick="cambiarLiga('femenil')" id="ligaBtn_femenil" class="liga-btn px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition-all tab-inactive">Ley 57 Fem</button>
        <button onclick="cambiarLiga('varonil')" id="ligaBtn_varonil" class="liga-btn px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition-all tab-inactive">ALV Sport Var</button>
        <button onclick="cambiarLiga('easy_femenil')" id="ligaBtn_easy_femenil" class="liga-btn px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition-all tab-inactive">Easy Femenil</button>
        <button onclick="cambiarLiga('slow_mixto')" id="ligaBtn_slow_mixto" class="liga-btn px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition-all tab-inactive">Slow Mixto</button>
    </div>

    <!-- TABS BATEO / PITCHEO -->
    <div class="flex gap-2 bg-slate-900 p-1.5 rounded-2xl max-w-md mx-auto border border-slate-800">
        <button onclick="cambiarTab('bateo')" id="tabBateo" class="flex-1 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all tab-active"><i class="fa fa-baseball-bat mr-2"></i>Bateo</button>
        <button onclick="cambiarTab('pitcheo')" id="tabPitcheo" class="flex-1 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all tab-inactive"><i class="fa fa-baseball mr-2"></i>Pitcheo</button>
    </div>

    <!-- CATEGORIAS DINAMICAS -->
    <div id="catsBateo" class="flex flex-wrap gap-2 justify-center">
        <button onclick="cambiarCat('avg')" id="catBtn_avg" class="cat-btn px-3 py-1.5 rounded-full text-[9px] font-black uppercase transition-all tab-active">AVG</button>
        <button onclick="cambiarCat('hr')" id="catBtn_hr" class="cat-btn px-3 py-1.5 rounded-full text-[9px] font-black uppercase transition-all tab-inactive">HR</button>
        <button onclick="cambiarCat('rbi')" id="catBtn_rbi" class="cat-btn px-3 py-1.5 rounded-full text-[9px] font-black uppercase transition-all tab-inactive">RBI</button>
        <button onclick="cambiarCat('h')" id="catBtn_h" class="cat-btn px-3 py-1.5 rounded-full text-[9px] font-black uppercase transition-all tab-inactive">Hits</button>
        <button onclick="cambiarCat('dobles')" id="catBtn_dobles" class="cat-btn px-3 py-1.5 rounded-full text-[9px] font-black uppercase transition-all tab-inactive">2B</button>
        <button onclick="cambiarCat('triples')" id="catBtn_triples" class="cat-btn px-3 py-1.5 rounded-full text-[9px] font-black uppercase transition-all tab-inactive">3B</button>
    </div>

    <div id="catsPitcheo" class="hidden flex flex-wrap gap-2 justify-center">
        <button onclick="cambiarCat('era')" id="catBtn_era" class="cat-btn px-3 py-1.5 rounded-full text-[9px] font-black uppercase transition-all tab-active">ERA (Efectividad)</button>
        <button onclick="cambiarCat('so_pitcher')" id="catBtn_so_pitcher" class="cat-btn px-3 py-1.5 rounded-full text-[9px] font-black uppercase transition-all tab-inactive">Ponches (SO)</button>
        <button onclick="cambiarCat('whip')" id="catBtn_whip" class="cat-btn px-3 py-1.5 rounded-full text-[9px] font-black uppercase transition-all tab-inactive">WHIP</button>
        <button onclick="cambiarCat('ip')" id="catBtn_ip" class="cat-btn px-3 py-1.5 rounded-full text-[9px] font-black uppercase transition-all tab-inactive">Innings (IP)</button>
    </div>

    <!-- TABLA DE LIDERES -->
    <div class="bg-slate-900 rounded-3xl shadow-2xl border border-slate-800 overflow-hidden">
        <div id="leaderTitle" class="bg-indigo-600 p-4 text-white font-black text-xs uppercase tracking-widest italic flex items-center gap-3">
            <i class="fa fa-crown text-yellow-400"></i> Cargando Rankings...
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-center text-xs">
                <thead>
                    <tr class="bg-slate-800 text-slate-400 font-black uppercase border-b border-slate-700">
                        <th class="p-4 text-left w-12">#</th>
                        <th class="p-4 text-left">Jugador</th>
                        <th>Equipo</th>
                        <th class="text-indigo-400">Valor</th>
                        <th>Liga Origen</th>
                    </tr>
                </thead>
                <tbody id="tablaLideres" class="divide-y divide-slate-800 font-bold"></tbody>
            </table>
        </div>
    </div>
</main>

<script>
const API = "https://ley57.onrender.com/api";
let ligaActual = 'todas';
let tabActual = 'bateo';
let catActual = 'avg';

const catLabels = {
    avg: 'Promedio de Bateo (AVG)', hr: 'Home Runs', dobles: 'Dobles (2B)', triples: 'Triples (3B)',
    rbi: 'Carreras Impulsadas', k: 'Ponches', bb: 'Boletos', h: 'Hits Totales',
    era: 'Efectividad (ERA)', so_pitcher: 'Ponches Recetados (SO)', whip: 'WHIP (Bases por Inning)', ip: 'Innings Lanzados (IP)'
};

function cambiarLiga(liga) {
    ligaActual = liga;
    document.querySelectorAll('.liga-btn').forEach(b => b.className = 'liga-btn px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition-all tab-inactive');
    document.getElementById('ligaBtn_' + liga).className = 'liga-btn px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition-all tab-active';
    cargarLideres();
}

function cambiarTab(tab) {
    tabActual = tab;
    document.getElementById('tabBateo').className = tab === 'bateo' ? 'flex-1 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all tab-active' : 'flex-1 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all tab-inactive';
    document.getElementById('tabPitcheo').className = tab === 'pitcheo' ? 'flex-1 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all tab-active' : 'flex-1 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all tab-inactive';
    
    document.getElementById('catsBateo').classList.toggle('hidden', tab !== 'bateo');
    document.getElementById('catsPitcheo').classList.toggle('hidden', tab !== 'pitcheo');
    
    catActual = tab === 'bateo' ? 'avg' : 'era';
    document.querySelectorAll('.cat-btn').forEach(b => b.className = 'cat-btn px-3 py-1.5 rounded-full text-[9px] font-black uppercase transition-all tab-inactive');
    const activeBtn = document.getElementById('catBtn_' + catActual);
    if(activeBtn) activeBtn.className = 'cat-btn px-3 py-1.5 rounded-full text-[9px] font-black uppercase transition-all tab-active';
    
    cargarLideres();
}

function cambiarCat(cat) {
    catActual = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.className = 'cat-btn px-3 py-1.5 rounded-full text-[9px] font-black uppercase transition-all tab-inactive');
    document.getElementById('catBtn_' + cat).className = 'cat-btn px-3 py-1.5 rounded-full text-[9px] font-black uppercase transition-all tab-active';
    cargarLideres();
}

async function cargarLideres() {
    const cont = document.getElementById('tablaLideres');
    cont.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-slate-500"><i class="fa fa-spinner fa-spin text-2xl"></i> Sincronizando Base de Datos...</td></tr>';

    try {
        const res = await fetch(`${API}/players?t=${new Date().getTime()}`);
        const allPlayers = await res.json();

        // 1. Filtrar por Liga
        let filtrados = allPlayers.filter(p => ligaActual === 'todas' || p.liga === ligaActual);

        // 2. Filtrar por Tab (Bateo o Pitcheo)
        if (tabActual === 'pitcheo') {
            filtrados = filtrados.filter(p => p.esPitcher || p.ip > 0);
        } else {
            filtrados = filtrados.filter(p => p.vb > 0); // Mínimo un turno al bat para aparecer en bateo
        }

        // 3. Ordenar según categoría
        const menorAMayor = ['era', 'whip']; // Estas categorías ganan con valor bajo
        const esMenorAMayor = menorAMayor.includes(catActual);

        filtrados.sort((a, b) => {
            const valA = parseFloat(a[catActual === 'so_pitcher' ? 'so_pitcher' : catActual]) || (esMenorAMayor ? 99 : 0);
            const valB = parseFloat(b[catActual === 'so_pitcher' ? 'so_pitcher' : catActual]) || (esMenorAMayor ? 99 : 0);
            return esMenorAMayor ? valA - valB : valB - valA;
        });

        const top20 = filtrados.slice(0, 20);

        // 4. Renderizar
        document.getElementById('leaderTitle').innerHTML = `<i class="fa fa-crown text-yellow-400 mr-2"></i> ${catLabels[catActual]}`;

        if (top20.length === 0) {
            cont.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-slate-500 italic">Sin datos registrados en esta selección</td></tr>';
            return;
        }

        cont.innerHTML = top20.map((p, i) => {
            const valorRaw = p[catActual === 'so_pitcher' ? 'so_pitcher' : catActual] || 0;
            const valorFormateado = ['avg', 'slg', 'obp'].includes(catActual) ? Number(valorRaw).toFixed(3) : 
                                   ['era', 'whip'].includes(catActual) ? Number(valorRaw).toFixed(2) : valorRaw;
            
            const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1;
            
            // Colores de liga según tu Admin
            const configLiga = {
                'femenil': { label: 'Ley 57 Fem', color: 'text-pink-500' },
                'varonil': { label: 'ALV Sport Var', color: 'text-blue-400' },
                'easy_femenil': { label: 'Easy Femenil', color: 'text-pink-400' },
                'slow_mixto': { label: 'Slow Mixto', color: 'text-emerald-400' }
            }[p.liga] || { label: p.liga, color: 'text-slate-500' };

            return `
                <tr class="hover:bg-slate-800/50 transition-all">
                    <td class="p-4 text-left w-12 text-lg">${medal}</td>
                    <td class="p-4 text-left">
                        <div class="text-white uppercase italic tracking-tighter">${p.nombre}</div>
                        <div class="text-[8px] text-slate-500 uppercase">Status: ${p.esPitcher ? 'PITCHER' : 'BATEADOR'}</div>
                    </td>
                    <td class="text-slate-400 uppercase text-[10px]">${p.equipo}</td>
                    <td class="font-black text-indigo-400 italic text-sm">${valorFormateado}</td>
                    <td class="${configLiga.color} font-black text-[9px] uppercase italic">${configLiga.label}</td>
                </tr>`;
        }).join('');

    } catch (err) {
        console.error("Error:", err);
        cont.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-red-400">Error de conexión con el servidor</td></tr>';
    }
}

document.addEventListener('DOMContentLoaded', cargarLideres);
</script>
</body>
</html>
