<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALV SPORT - Acceso Administrativo</title>
    <link rel="icon" type="image/png" href="logoley57icon.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        body {
            margin: 0;
            background: linear-gradient(-45deg, #020617, #0f172a, #1e1b4b, #450a0a);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .bg-carbon {
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }
        .active-role { 
            background-color: #ef4444 !important; 
            color: white !important; 
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); 
        }
        .card-style {
            background-color: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 6px solid #ef4444;
            z-index: 20;
        }
        .floating-item {
            position: absolute;
            pointer-events: none;
            color: rgba(239, 68, 68, 0.1);
            z-index: 1;
        }
        .animate-fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 font-sans relative bg-carbon">

    <div id="animation-container" class="absolute inset-0 overflow-hidden"></div>

    <div id="login-card" class="card-style p-8 md:p-10 rounded-[3rem] shadow-2xl w-full max-w-md text-center relative animate-fade-in">
        
        <div class="mb-8 flex flex-col items-center">
            <p class="text-[8px] font-black text-slate-500 uppercase tracking-[0.6em] mb-4">Plataforma de Gestión</p>
            <div class="flex items-center justify-center gap-6">
                <img src="logoalvnegro.jpeg" alt="ALV Sport" class="h-16 md:h-20 w-auto drop-shadow-[0_0_10px_rgba(255,255,255,0.1)] rounded-xl">
            </div>
            <div class="h-1 w-16 bg-red-600 mt-6 rounded-full shadow-[0_0_15px_rgba(220,38,38,0.5)]"></div>
        </div>

        <h2 class="text-white text-2xl font-black mb-1 italic uppercase tracking-tighter">Panel de Control</h2>
        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.4em] mb-8">Acceso Privado 2026</p>

        <div class="flex bg-slate-900/50 p-1.5 rounded-2xl mb-8 border border-white/5">
            <button onclick="setRole('manager')" id="btn-manager" class="flex-1 py-3 text-[10px] font-black rounded-xl transition-all duration-300 active-role uppercase">Manager</button>
            <button onclick="setRole('admin')" id="btn-admin" class="flex-1 py-3 text-[10px] font-black rounded-xl transition-all duration-300 text-slate-500 uppercase">Administrador</button>
        </div>

        <div id="login-fields" class="space-y-4 mb-8">
            <div class="relative group">
                <i class="fa fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-red-500 transition-colors"></i>
                <input type="text" id="u" placeholder="Correo Electrónico" class="w-full p-4 pl-12 rounded-2xl bg-black/40 border border-white/10 text-white font-bold text-sm outline-none focus:border-red-600/50 transition-all placeholder:text-slate-600">
            </div>
            <div class="relative group">
                <i class="fa fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-red-500 transition-colors"></i>
                <input type="password" id="p" placeholder="Contraseña" class="w-full p-4 pl-12 rounded-2xl bg-black/40 border border-white/10 text-white font-bold text-sm outline-none focus:border-red-600/50 transition-all placeholder:text-slate-600">
            </div>
        </div>
        
        <button onclick="entrar()" class="w-full bg-red-600 hover:bg-white hover:text-red-600 text-white font-black py-4 rounded-2xl transition-all duration-500 shadow-[0_10px_30px_rgba(220,38,38,0.3)] uppercase tracking-widest text-xs italic">
            Iniciar Sesión <i class="fa fa-sign-in-alt ml-2"></i>
        </button>

        <div class="mt-10 pt-8 border-t border-white/5 flex flex-col items-center">
            <p class="text-[8px] font-black text-slate-500 uppercase tracking-[0.5em] mb-3">Desarrollado por</p>
            <div class="flex items-center gap-3">
                <img src="fv_digital_logo.png.webp" class="h-8 opacity-80">
                <div class="text-left">
                    <p class="text-white text-[10px] font-black italic uppercase leading-none">FV DIGITAL</p>
                    <p class="text-slate-600 text-[7px] font-bold uppercase tracking-widest">© 2026 Software Eng.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://ley57.onrender.com/api";
        let selectedRole = 'manager';

        function setRole(role) {
            selectedRole = role;
            ['manager', 'admin'].forEach(r => {
                const btn = document.getElementById(`btn-${r}`);
                btn.classList.remove('active-role');
                btn.classList.add('text-slate-500');
            });
            document.getElementById(`btn-${role}`).classList.add('active-role');
        }

        async function entrar() {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;

            if(!u || !p) return alert("Por favor, ingresa tus credenciales.");

            try {
                const res = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ correo: u, pass: p })
                });

                if(res.ok) {
                    const user = await res.json();
                    if (user.rol === 'admin') {
                        localStorage.setItem('userLogueado', JSON.stringify(user));
                        localStorage.removeItem('managerLogueado'); 
                        window.location.href = 'admin.html';
                    } else if (user.rol === 'manager') {
                        localStorage.setItem('managerLogueado', JSON.stringify(user));
                        localStorage.removeItem('userLogueado');
                        window.location.href = 'manager.html'; 
                    }
                } else {
                    const error = await res.json();
                    alert(error.mensaje || "Credenciales incorrectas");
                }
            } catch (error) {
                alert("Error al conectar con el servidor ALV.");
            }
        }

        // Animación de fondo
        const container = document.getElementById('animation-container');
        const icons = ['fa-baseball-ball', 'fa-shield-halved', 'fa-bolt'];
        function createItem() {
            const item = document.createElement('i');
            item.className = `fa ${icons[Math.floor(Math.random()*icons.length)]} floating-item`;
            const size = Math.random() * 40 + 20;
            item.style.fontSize = `${size}px`;
            let x = Math.random() * window.innerWidth, y = Math.random() * window.innerHeight;
            let sx = (Math.random()-0.5)*1.5, sy = (Math.random()-0.5)*1.5;
            container.appendChild(item);
            function move() {
                x += sx; y += sy;
                if (x < -50 || x > window.innerWidth + 50) sx *= -1;
                if (y < -50 || y > window.innerHeight + 50) sy *= -1;
                item.style.transform = `translate(${x}px, ${y}px)`;
                requestAnimationFrame(move);
            }
            move();
        }
        for (let i = 0; i < 15; i++) { createItem(); }
    </script>
</body>
</html>
