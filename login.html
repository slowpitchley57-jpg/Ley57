<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STADIUM ACCESS - ALV SPORT</title>
    <link rel="icon" type="image/png" href="logoalvnegro.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Oswald:wght@700&display=swap');

        body { font-family: 'Inter', sans-serif; background-color: #050505; }
        .font-oswald { font-family: 'Oswald', sans-serif; }

        /* Fondo estilo ESPN (Cortes Diagonales) */
        .bg-stadium {
            background: 
                linear-gradient(135deg, rgba(0,0,0,0.95) 0%, rgba(10,10,10,0.9) 100%),
                url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
            position: relative;
            overflow: hidden;
        }

        /* Luces de Transmisión */
        .scanner-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ef4444, transparent);
            animation: scan 4s linear infinite;
            opacity: 0.3;
        }

        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        /* Marco de Tarjeta con Corte Diagonal */
        .frame-stadium {
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.05);
            clip-path: polygon(0 0, 95% 0, 100% 5%, 100% 100%, 5% 100%, 0 95%);
            position: relative;
        }

        .frame-stadium::after {
            content: "";
            position: absolute;
            top: 0; right: 0;
            width: 40px; height: 40px;
            background: #ef4444;
            clip-path: polygon(100% 0, 100% 100%, 0 0);
        }

        /* Botones de Rol Estilo Fox Sports */
        .role-btn {
            background: #1e293b;
            color: #64748b;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .role-btn.active-role {
            background: #ef4444 !important;
            color: white !important;
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.4);
        }

        .input-stadium {
            background: #020617;
            border-bottom: 2px solid #334155;
            transition: all 0.3s;
        }

        .input-stadium:focus {
            border-bottom-color: #ef4444;
            background: #0f172a;
        }

        .btn-action {
            background: #ef4444;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
            transition: all 0.3s;
        }

        .btn-action:hover {
            background: #ffffff;
            color: #ef4444;
            transform: skewX(-5deg);
        }
    </style>
</head>
<body class="bg-stadium min-h-screen flex items-center justify-center p-4">

    <div class="scanner-line"></div>

    <main class="relative z-10 w-full max-w-[450px]">
        <!-- Decoración Superior -->
        <div class="flex justify-between items-end mb-2 px-4">
            <div class="text-[10px] font-black text-red-600 tracking-[0.5em] uppercase">Secure Login</div>
            <div class="h-[1px] flex-1 bg-red-600/30 mx-4 mb-1"></div>
            <div class="text-[10px] font-black text-slate-500 uppercase">Ver. 2.0</div>
        </div>

        <div class="frame-stadium p-8 md:p-12 shadow-[0_0_80px_rgba(0,0,0,0.8)]">
            
            <!-- Logo y Header -->
            <div class="flex flex-col items-center mb-10">
                <div class="bg-white p-2 rounded-xl mb-6 skew-x-[-10deg] shadow-xl">
                    <img src="logoalvnegro.jpeg" class="h-16 w-auto" alt="Logo">
                </div>
                <h1 class="font-oswald text-4xl text-white uppercase italic tracking-tighter">
                    MANAGEMENT <span class="text-red-600">SYSTEM</span>
                </h1>
                <div class="w-full h-[2px] bg-gradient-to-r from-transparent via-slate-700 to-transparent mt-4"></div>
            </div>

            <!-- Selector de Rol (Cortes Diagonales) -->
            <div class="grid grid-cols-2 gap-0 mb-8 px-4">
                <button onclick="setRole('manager')" id="btn-manager" class="role-btn py-3 font-black text-[11px] uppercase tracking-widest active-role">
                    Manager
                </button>
                <button onclick="setRole('admin')" id="btn-admin" class="role-btn py-3 font-black text-[11px] uppercase tracking-widest">
                    Staff Admin
                </button>
            </div>

            <!-- Campos -->
            <div class="space-y-6 mb-10">
                <div class="relative">
                    <label class="block text-[8px] font-black text-slate-500 uppercase tracking-widest mb-1 ml-1">Identity Check</label>
                    <input type="text" id="u" placeholder="USUARIO / CORREO" class="input-stadium w-full p-4 text-white font-bold text-xs outline-none uppercase italic">
                </div>
                <div class="relative">
                    <label class="block text-[8px] font-black text-slate-500 uppercase tracking-widest mb-1 ml-1">Access Key</label>
                    <input type="password" id="p" placeholder="••••••••" class="input-stadium w-full p-4 text-white font-bold text-xs outline-none italic">
                </div>
            </div>
            
            <!-- Botón Pro -->
            <button onclick="entrar()" class="btn-action w-full py-5 text-white font-black text-sm uppercase italic tracking-[0.3em] shadow-2xl">
                AUTH ACCESS <i class="fa fa-chevron-right ml-2 text-[10px]"></i>
            </button>

            <!-- Footer Branding -->
            <div class="mt-12 flex items-center justify-center gap-4 opacity-40 grayscale hover:opacity-100 hover:grayscale-0 transition-all">
                <span class="text-[8px] font-black text-slate-400 uppercase tracking-widest">Powered by</span>
                <img src="fv_digital_logo.png.webp" class="h-10" alt="FV">
            </div>
        </div>

        <!-- Decoración Inferior -->
        <div class="mt-6 flex justify-center gap-2">
            <div class="w-2 h-2 bg-red-600 rotate-45 animate-pulse"></div>
            <div class="w-2 h-2 bg-slate-800 rotate-45"></div>
            <div class="w-2 h-2 bg-slate-800 rotate-45"></div>
        </div>
    </main>

    <script>
        const API = "https://ley57.onrender.com/api";
        let selectedRole = 'manager';

        function setRole(role) {
            selectedRole = role;
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.remove('active-role');
            });
            document.getElementById(`btn-${role}`).classList.add('active-role');
        }

        async function entrar() {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            if(!u || !p) return alert("REQUIRED: INPUT CREDENTIALS");

            try {
                const res = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ correo: u, pass: p })
                });

                if(res.ok) {
                    const user = await res.json();
                    localStorage.setItem(user.rol === 'admin' ? 'userLogueado' : 'managerLogueado', JSON.stringify(user));
                    window.location.href = user.rol === 'admin' ? 'admin.html' : 'manager.html';
                } else {
                    alert("ERROR: INVALID CREDENTIALS");
                }
            } catch (e) {
                alert("NETWORK ERROR: SERVER UNREACHABLE");
            }
        }
    </script>
</body>
</html>
