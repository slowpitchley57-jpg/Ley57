<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALV SPORT - Acceso Administrativo</title>
    <link rel="icon" type="image/png" href="logoley57icon.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        body {
            margin: 0;
            background: linear-gradient(-45deg, #020617, #0f172a, #1e1b4b, #450a0a);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            min-height: 100vh;
            /* Usamos h-screen dinámico para móviles */
            height: 100dvh; 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .bg-carbon {
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.4;
        }
        .active-role { 
            background-color: #ef4444 !important; 
            color: white !important; 
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); 
        }
        .card-style {
            background-color: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 6px solid #ef4444;
            z-index: 20;
            width: 90%;
            max-width: 400px;
            /* Ajuste para que no se corte en pantallas pequeñas */
            max-height: 95vh;
            overflow-y: auto;
        }
        .card-style::-webkit-scrollbar { width: 0px; }
        
        .floating-item {
            position: absolute;
            pointer-events: none;
            color: rgba(239, 68, 68, 0.1);
            z-index: 1;
        }
        .animate-fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 font-sans">

    <div class="bg-carbon"></div>
    <div id="animation-container" class="absolute inset-0 overflow-hidden"></div>

    <div id="login-card" class="card-style p-6 md:p-10 rounded-[2.5rem] shadow-2xl relative animate-fade-in">
        
        <div class="mb-6 flex flex-col items-center">
            <p class="text-[8px] font-black text-slate-500 uppercase tracking-[0.6em] mb-4 text-center">Gestión Profesional</p>
            <img src="logoalvnegro.jpeg" alt="ALV Sport" class="h-16 md:h-20 w-auto rounded-xl shadow-lg border border-white/5">
            <div class="h-1 w-12 bg-red-600 mt-4 rounded-full shadow-[0_0_10px_rgba(220,38,38,0.5)]"></div>
        </div>

        <div class="mb-6">
            <h2 class="text-white text-xl md:text-2xl font-black italic uppercase tracking-tighter">Panel Administrativo</h2>
            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.4em]">Acceso Administrativo</p>
        </div>

        <div class="flex bg-slate-900/80 p-1 rounded-2xl mb-6 border border-white/5">
            <button onclick="setRole('manager')" id="btn-manager" class="flex-1 py-3 text-[10px] font-black rounded-xl transition-all duration-300 active-role uppercase">Manager</button>
            <button onclick="setRole('admin')" id="btn-admin" class="flex-1 py-3 text-[10px] font-black rounded-xl transition-all duration-300 text-slate-500 uppercase">Admin</button>
        </div>

        <div id="login-fields" class="space-y-3 mb-6">
            <div class="relative">
                <i class="fa fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                <input type="text" id="u" placeholder="Usuario / Correo" class="w-full p-3.5 pl-11 rounded-xl bg-black/40 border border-white/10 text-white font-bold text-sm outline-none focus:border-red-600/50 transition-all placeholder:text-slate-600">
            </div>
            <div class="relative">
                <i class="fa fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                <input type="password" id="p" placeholder="Contraseña" class="w-full p-3.5 pl-11 rounded-xl bg-black/40 border border-white/10 text-white font-bold text-sm outline-none focus:border-red-600/50 transition-all placeholder:text-slate-600">
            </div>
        </div>
        
        <button onclick="entrar()" class="w-full bg-red-600 hover:bg-white hover:text-red-600 text-white font-black py-4 rounded-xl transition-all duration-500 shadow-xl uppercase tracking-widest text-[10px] italic">
            Entrar al Sistema <i class="fa fa-shield-alt ml-2"></i>
        </button>

        <div class="relative group">
    <div class="absolute inset-0 bg-blue-500/20 blur-3xl rounded-full opacity-0 group-hover:opacity-100 transition-opacity duration-700"></div>
    
    <a href="https://wa.me/526625374491?text=Hola%20FV%20Digital,%20me%20interesa%20obtener%20información%20sobre%20tus%20servicios%20de%20software" 
       target="_blank" 
       class="block relative z-10">
        <img src="fv_digital_logo.png.webp" 
             class="h-24 md:h-32 drop-shadow-[0_0_20px_rgba(255,255,255,0.1)] hover:drop-shadow-[0_0_30px_rgba(59,130,246,0.5)] transition-all duration-500 transform hover:scale-110"
             alt="FV Digital Logo">
    </a>
</div>
    </div>

    <script>
        const API = "https://ley57.onrender.com/api";
        let selectedRole = 'manager';

        function setRole(role) {
            selectedRole = role;
            ['manager', 'admin'].forEach(r => {
                const btn = document.getElementById(`btn-${r}`);
                btn.classList.remove('active-role');
                btn.classList.add('text-slate-500');
            });
            document.getElementById(`btn-${role}`).classList.add('active-role');
        }

        async function entrar() {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            if(!u || !p) return alert("Ingresa tus datos.");

            try {
                const res = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ correo: u, pass: p })
                });

                if(res.ok) {
                    const user = await res.json();
                    if (user.rol === 'admin') {
                        localStorage.setItem('userLogueado', JSON.stringify(user));
                        window.location.href = 'admin.html';
                    } else {
                        localStorage.setItem('managerLogueado', JSON.stringify(user));
                        window.location.href = 'manager.html'; 
                    }
                } else {
                    alert("Credenciales incorrectas.");
                }
            } catch (error) {
                alert("Error de conexión.");
            }
        }

        const container = document.getElementById('animation-container');
        const icons = ['fa-baseball-ball', 'fa-trophy', 'fa-star'];
        function createItem() {
            const item = document.createElement('i');
            item.className = `fa ${icons[Math.floor(Math.random()*icons.length)]} floating-item`;
            const size = Math.random() * 30 + 15;
            item.style.fontSize = `${size}px`;
            let x = Math.random() * window.innerWidth, y = Math.random() * window.innerHeight;
            let sx = (Math.random()-0.5)*1, sy = (Math.random()-0.5)*1;
            container.appendChild(item);
            function move() {
                x += sx; y += sy;
                if (x < -50 || x > window.innerWidth + 50) sx *= -1;
                if (y < -50 || y > window.innerHeight + 50) sy *= -1;
                item.style.transform = `translate(${x}px, ${y}px)`;
                requestAnimationFrame(move);
            }
            move();
        }
        for (let i = 0; i < 15; i++) { createItem(); }
    </script>
</body>
</html>
