<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Líderes Varonil - ALV SPORT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .bg-carbon { 
            background-color: #111;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }
        .text-fire { color: #ff4d4d; text-shadow: 0 0 10px rgba(255, 77, 77, 0.3); }
        .table-varonil { background: rgba(0,0,0,0.4); border: 1px solid #333; }
    </style>
</head>
<body class="bg-black text-slate-300 font-sans">

    <nav class="bg-carbon p-4 border-b-4 border-red-700 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <span class="font-black italic uppercase tracking-tighter text-xl underline">ALV <span class="text-red-600">SPORT</span></span>
            <a href="index.html" class="text-[10px] bg-red-700 px-5 py-2 rounded-full font-black uppercase tracking-widest">Regresar</a>
        </div>
    </nav>

    <header class="py-16 px-6 text-center bg-carbon border-b border-zinc-800">
        <p class="text-red-600 text-[10px] uppercase tracking-[0.8em] font-black mb-2">Ranking Global de Jugadores</p>
        <h1 class="text-5xl font-black italic uppercase tracking-tighter text-white">THE <span class="text-fire">ELITE</span></h1>
    </header>

    <main class="max-w-7xl mx-auto p-4 -mt-10 space-y-6">
        <div class="bg-red-700/10 border-l-4 border-red-700 p-4 rounded-lg">
            <p class="text-[10px] font-black uppercase text-red-500 italic">
                <i class="fa fa-skull mr-2"></i> Regla: Mínimo 5 juegos para entrar a postemporada.
            </p>
        </div>

        <div class="relative group">
            <input type="text" id="buscadorHombres" onkeyup="filtrarTabla()" placeholder="Filtrar por nombre o escuadra..." 
                class="w-full pl-12 pr-4 py-4 bg-zinc-900/80 border-2 border-zinc-800 rounded-2xl text-xs font-bold uppercase text-white focus:border-red-600 outline-none transition-all">
            <i class="fa fa-search absolute left-5 top-1/2 -translate-y-1/2 text-zinc-600 group-focus-within:text-red-600 transition-colors"></i>
        </div>

        <div class="table-varonil rounded-[2rem] overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-[11px]">
                    <thead>
                        <tr class="bg-zinc-900 text-zinc-500 uppercase font-black border-b border-zinc-800 text-center">
                            <th class="p-5 text-left text-white">Player / Team</th>
                            <th class="p-2">JJ</th>
                            <th class="p-2">AB</th>
                            <th class="p-2 text-white">H</th>
                            <th class="p-2">2B</th>
                            <th class="p-2">3B</th>
                            <th class="p-2 text-red-600">HR</th>
                            <th class="p-2 text-fire text-sm italic">AVG</th>
                        </tr>
                    </thead>
                    <tbody id="tablaGlobal" class="divide-y divide-zinc-900"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const API = "https://ley57.onrender.com/api";
        async function cargar() {
    try {
        // Traemos equipos y jugadores al mismo tiempo (ajusta 'varonil' o 'femenil' según la página)
        const [resP, resE] = await Promise.all([
            fetch(`${API}/players?liga=varonil`), 
            fetch(`${API}/equipos?liga=varonil`)
        ]);
        
        const players = await resP.json();
        const equipos = await resE.json();

        const tabla = document.getElementById('tablaGlobal');
        
        // Ordenar por AVG (o podrías ordenar por RBI si prefieres)
        players.sort((a,b) => (b.avg || 0) - (a.avg || 0));

        tabla.innerHTML = players.map(p => {
            // BUSCAMOS LA CATEGORÍA: Buscamos el equipo del jugador en la lista de equipos
            const datosEquipo = equipos.find(e => e.nombre === p.equipo);
            const categoria = datosEquipo ? datosEquipo.categoria : "S/N";

            return `
                <tr class="fila-jugador hover:bg-white/5 transition-all text-center border-b border-zinc-900">
                    <td class="p-4 text-left">
                        <div class="font-black text-white uppercase italic tracking-tighter">${p.nombre}</div>
                        <div class="text-[9px] text-red-600 font-black uppercase">${p.equipo}</div>
                    </td>
                    <td class="text-zinc-500 font-bold italic">${categoria}</td> <td class="font-bold text-zinc-500 bg-white/5">${p.jj || 0}</td>
                    <td>${p.vb || 0}</td>
                    <td class="text-white font-bold">${p.h || 0}</td>
                    <td class="text-red-500 font-black">${p.rbi || 0}</td> <td class="text-orange-500 font-black">${p.hr || 0}</td>
                    <td class="font-black text-sm text-fire italic">${(p.avg || 0).toFixed(3)}</td>
                </tr>`;
        }).join('');
    } catch (e) { console.error(e); }
}
        function filtrarTabla() {
            const bus = document.getElementById('buscadorHombres').value.toUpperCase();
            const filas = document.getElementsByClassName('fila-jugador');
            for (let f of filas) f.style.display = f.innerText.toUpperCase().includes(bus) ? "" : "none";
        }
        cargar();
    </script>
</body>
</html>
